openapi: 3.1.0
info:
  title: Cassandra Banking Core & Compliance Platform
  description: 'Complete OpenAPI specification for the Cassandra core banking system and compliance platform.


    This spec serves triple duty:

    1. **API documentation** — standard endpoints, schemas, parameters

    2. **Compliance vocabulary source** — every field a control can reference

    3. **Event & computed field registry** — via x- extensions


    The vocabulary parser extracts entities, fields, events, and computed fields

    from this spec to produce vocabulary.json for the Control Builder and compiler.


    ## Extension Reference


    | Extension | Applies To | Purpose |

    |-----------|-----------|--------|

    | `x-events` | schemas | Domain events the entity emits |

    | `x-entity` | schemas | Declares the domain entity name |

    | `x-pii` | properties | Marks personally identifiable information |

    | `x-computed` | properties | Runtime-derived fields |

    | `x-plugin` | properties | Field resolved by a registered plugin |

    | `x-retention` | schemas | Minimum retention period |

    | `x-state-machine` | enum properties | Valid transitions with events |

    | `x-control-refs` | schemas, paths | Maps to control IDs |

    | `x-freshness` | properties | Max data age before refresh |

    | `x-audit-events` | paths | Audit trail events emitted |


    ## Coverage


    - **223 controls** across 17 prefixes

    - **433 trigger events**

    - **400 audit events**

    - **165 entity domains** with **647 fields**

    '
  version: 1.0.0
  contact:
    name: Cassandra Engineering
    url: https://docs.cassandra.pynthia.com
  license:
    name: Proprietary
servers:
- url: https://{instance}.cassandra.pynthia.com/v1
  variables:
    instance:
      default: sandbox
      description: Fintech instance identifier
tags:
- name: Entities
  description: Person, business, trust, joint entity lifecycle
- name: Accounts
  description: Account and account number management
- name: Lending
  description: Loan origination, underwriting, decisioning, servicing
- name: Transfers
  description: ACH, wire, and payment processing
- name: BSA/AML
  description: BSA/AML compliance, screening, monitoring
- name: Collections
  description: Collections, disputes, credit reporting
- name: Fair Lending
  description: Fair lending risk assessment, advertising controls
- name: Privacy
  description: GLBA privacy, consent management, data rights
- name: Vendor Management
  description: Third-party/vendor lifecycle, due diligence, contracts
- name: Cybersecurity
  description: Information security governance, incident response, access control
- name: Business Continuity
  description: BCP, disaster recovery, testing
- name: Investments
  description: Investment portfolio management, trading, risk
- name: Governance
  description: Policy management, training, audit, governance
- name: Enterprise Risk
  description: ERM framework, risk appetite, KRIs, breaches
- name: Resolution
  description: Resolution and wind-down planning
- name: Charitable Donation Accounts
  description: CDA program governance, distributions, compliance
- name: Cash Control
  description: Physical cash management, vault, teller operations
- name: Contingency Funding
  description: Contingency funding plan, early warning, stress testing
- name: Liquidity
  description: Liquidity management and ALM
