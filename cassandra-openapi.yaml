      x-entity: account
      x-retention: 7y
      x-control-refs:
      - CD-12
      - PR-01
      - PR-15
      x-events:
      - name: account.closed
        description: ''
        trigger: on_action
      - name: account.connection.created
        description: ''
        trigger: on_create
      - name: account.connection.revoked
        description: ''
        trigger: on_action
      - name: account.opened
        description: ''
        trigger: on_action
      required:
      - id
      - status
      properties:
        id:
          type: string
          pattern: ^acco_[a-zA-Z0-9]{20}$
          description: Unique identifier for this account
        status:
          type: string
          enum:
          - open
          - frozen
          - closed
          x-state-machine:
            transitions:
            - from: open
              to: frozen
              event: account.transition.open_to_frozen
            - from: frozen
              to: open
              event: account.transition.frozen_to_open
            - from: frozen
              to: closed
              event: account.transition.frozen_to_closed
            - from: open
              to: closed
              event: account.transition.open_to_closed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AccountCreate:
      type: object
      required: []
      properties: {}
    AccountUpdate:
      type: object
      properties: {}
    AchTransfer:
      type: object
      x-entity: ach_transfer
      x-retention: 5y
      x-control-refs:
      - BA-07
      - BA-08
      - BA-09
      - BA-10
      x-events:
      - name: ach.created
        description: ACH transfer initiated
        trigger: on_create
      - name: ach.settled
        description: ACH transfer settled
        trigger: on_status_change
      - name: ach.returned
        description: ACH transfer returned
        trigger: on_status_change
      required:
      - id
      - status
      - amount
      - direction
      properties:
        id:
          type: string
          pattern: ^ach_[a-zA-Z0-9]{20}$
        status:
          type: string
          enum:
          - pending_approval
          - submitted
          - settled
          - returned
          - rejected
          - canceled
          x-state-machine:
            transitions:
            - from: pending_approval
              to: submitted
              event: ach.transition.pending_approval_to_submitted
            - from: pending_approval
              to: rejected
              event: ach.transition.pending_approval_to_rejected
            - from: submitted
              to: settled
              event: ach.transition.submitted_to_settled
            - from: submitted
              to: canceled
              event: ach.transition.submitted_to_canceled
            - from: settled
              to: returned
              event: ach.transition.settled_to_returned
        amount:
          type: number
          format: float
          minimum: 0.01
        direction:
          type: string
          enum:
          - credit
          - debit
        source_account_id:
          type: string
        destination_routing_number:
          type: string
        destination_account_number:
          type: string
          x-pii: true
        effective_date:
          type: string
          format: date
        expected_settlement:
          type: string
          format: date
        window:
          type: string
          enum:
          - standard
          - same_day
        member_id:
          type: string
        control_results:
          type: object
