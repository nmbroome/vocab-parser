openapi: 3.1.0
info:
  title: Cassandra Banking Core API
  version: 1.0.0
  description: |
    BaaS core banking API for Pynthia Credit Union and white-labeled credit union instances.

    This spec covers two API surfaces:
    - **Fintech Instance API** — the BaaS API each fintech partner integrates against
    - **Aggregator API** — cross-instance operations for payment origination, FBO positions, and BSA visibility

    ## Architecture

    Each fintech partner operates on a fully isolated instance (Blnk Deploy + Supabase + DuckDB).
    The aggregator layer provides cross-fintech visibility for compliance and Fed settlement.

    ## Authentication

    **Fintech Instance API:** Bearer token scoped to `partner_id`, allowed endpoints, and rate limits.
    **Aggregator API:** mTLS (transport) + short-lived JWT (application), 1-hour token expiry.

    ## Idempotency

    All mutating endpoints require an `Idempotency-Key` header. Keys never expire and are never reusable.
    Same key + same args returns the cached response with `Idempotent-Replayed: true`.
    Same key + different args returns `409 Conflict`.

    ## Pagination

    All list endpoints use transparent cursor-based pagination with `limit` and `after` parameters.

    ## Environments

    | Environment | Base URL |
    |-------------|----------|
    | Production  | `https://api.cassandra.bank/v1` |
    | Sandbox     | `https://sandbox.api.cassandra.bank/v1` |
    | Aggregator  | `https://aggregator.api.cassandra.bank/v1` |

  contact:
    name: Pynthia Engineering
    email: engineering@pynthia.com
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: https://api.cassandra.bank/v1
    description: Production — Fintech Instance API
  - url: https://sandbox.api.cassandra.bank/v1
    description: Sandbox — Fintech Instance API (production-matching validation)
  - url: https://aggregator.api.cassandra.bank/v1
    description: Aggregator API — cross-instance operations

tags:
  # --- Fintech Instance API ---
  - name: Entities
    description: |
      Unified entity namespace with type-discriminated creation endpoints.
      Entity types: `person`, `business`, `trust`, `joint`.
      Joint accounts are modeled via `owners[]` on Account, not at the Entity level —
      the `joint` entity type represents the relationship grouping itself.
  - name: Accounts
    description: Ledger accounts with 1:many account numbers.
  - name: Account Numbers
    description: 12-digit routable account numbers (3 prefix + 8 sequence + 1 Luhn check).
  - name: ACH Transfers
    description: Semi-transparent ACH with explicit approval gating.
  - name: Wire Transfers
    description: Domestic Fedwire with return request support.
  - name: Book Transfers
    description: Instant on-us transfers between accounts within the same instance.
  - name: Cards
    description: Card issuing via BIN sponsor adapter (Marqeta/Lithic).
  - name: KYC Verifications
    description: Multi-provider identity verification with partner-provided option.
  - name: Bookkeeping
    description: Shadow bookkeeping layer for 5300 account code tagging and FBO classification.
  - name: Events
    description: Webhook event delivery and backfill.
  - name: Webhooks
    description: Partner webhook endpoint management.
  - name: Sandbox
    description: Simulation endpoints for forced outcomes (sandbox environment only).
  # --- Aggregator API ---
  - name: Aggregator — Payments
    description: Cross-instance payment origination (ACH, wire, RTP).
  - name: Aggregator — FBO
    description: FBO position queries and available balance checks.
  - name: Aggregator — BSA
    description: BSA alert queries and cross-fintech entity search.
  - name: Aggregator — Auth
    description: Instance authentication token management.

# ============================================================================
# Security
# ============================================================================
security:
  - BearerToken: []

components:

  # --------------------------------------------------------------------------
  # Security Schemes
  # --------------------------------------------------------------------------
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Partner API token scoped to `partner_id`, allowed endpoints, and rate tier.
        Issued by Pynthia during partner onboarding.
    AggregatorJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived JWT (1-hour expiry) issued via `POST /auth/token`.
        Transport secured by mTLS — JWT provides application-level identity.

  # --------------------------------------------------------------------------
  # Common Parameters
  # --------------------------------------------------------------------------
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 255
        examples:
          - "ik_a1b2c3d4e5f6"
      description: |
        Unique key for idempotent request processing. Never expires, never reusable.
        Same key + same args → cached response with `Idempotent-Replayed: true` header.
        Same key + different args → `409 Conflict`.

    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum number of results to return.

    PaginationAfter:
      name: after
      in: query
      required: false
      schema:
        type: string
      description: |
        Cursor for forward pagination. Pass the `next_after` value from the previous response.
        Results are ordered by creation time (newest first).

  # --------------------------------------------------------------------------
  # Common Headers
  # --------------------------------------------------------------------------
  headers:
    X-Request-Id:
      schema:
        type: string
      description: Unique request identifier for support correlation.
    X-API-Version:
      schema:
        type: string
        examples:
          - "1.0.0"
      description: Current API version (semantic versioning).
    X-RateLimit-Limit:
      schema:
        type: integer
      description: Rate limit ceiling for this endpoint tier.
    X-RateLimit-Remaining:
      schema:
        type: integer
      description: Remaining requests in the current window.
    X-RateLimit-Reset:
      schema:
        type: integer
        format: unix-timestamp
      description: Unix timestamp when the rate limit window resets.
    X-RateLimit-Tier:
      schema:
        type: string
        enum: [read, write, real_time, bulk]
      description: Rate limit tier for this endpoint.
    X-RateLimit-Warning:
      schema:
        type: string
        enum: [approaching_limit]
      description: Present when usage exceeds 80% of the limit.
    Idempotent-Replayed:
      schema:
        type: boolean
      description: |
        Present and `true` when the response is a cached replay of a previous
        identical idempotent request.

  # --------------------------------------------------------------------------
  # Responses
  # --------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Validation error — one or more fields failed validation.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

    Unauthorized:
      description: Missing or invalid authentication token.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 401
            type: authentication_required
            title: Authentication Required
            detail: "Bearer token is missing or invalid."
            doc_url: "https://api.cassandra.bank/docs/errors/authentication-required"
            request_id: req_abc123def456

    Forbidden:
      description: Token valid but insufficient permissions for this operation.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 404
            type: resource_not_found
            title: Resource Not Found
            detail: "Entity ent_abc123 does not exist."
            doc_url: "https://api.cassandra.bank/docs/errors/resource-not-found"
            request_id: req_abc123def456
            resource_id: ent_abc123
            resource_type: entity

    Conflict:
      description: Idempotency key reused with different arguments.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 409
            type: idempotency_key_reused
            title: Idempotency Key Reused
            detail: "Idempotency key ik_a1b2c3 was already used with different request parameters."
            doc_url: "https://api.cassandra.bank/docs/errors/idempotency-key-reused"
            request_id: req_abc123def456

    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
        X-RateLimit-Tier:
          $ref: "#/components/headers/X-RateLimit-Tier"
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalServerError:
      description: Unexpected server error.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # --------------------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------------------
  schemas:

    # ========================================================================
    # Common
    # ========================================================================
    Error:
      type: object
      required: [status, type, title, detail, doc_url, request_id]
      properties:
        status:
          type: integer
          description: HTTP status code.
        type:
          type: string
          description: Machine-readable error type identifier.
        title:
          type: string
          description: Human-readable error title.
        detail:
          type: string
          description: Human-readable explanation of the error.
        doc_url:
          type: string
          format: uri
          description: Link to documentation for this error type.
        request_id:
          type: string
          description: Unique request identifier for support correlation.
        resource_id:
          type: string
          description: ID of the resource that caused the error (when applicable).
        resource_type:
          type: string
          description: Type of the resource that caused the error (when applicable).

    ValidationError:
      type: object
      required: [status, type, errors]
      properties:
        status:
          type: integer
          const: 400
        type:
          type: string
          const: validation_error
        request_id:
          type: string
        doc_url:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            required: [type, field, message]
            properties:
              type:
                type: string
                description: |
                  Error classification.
                enum:
                  - required_field
                  - invalid_format
                  - invalid_value
                  - invalid_length
                  - mutually_exclusive
                  - field_immutable
              field:
                type: string
                description: JSON path to the offending field (e.g. `address.postal_code`).
              message:
                type: string
                description: Human-readable explanation.

    Pagination:
      type: object
      required: [has_more, limit]
      properties:
        has_more:
          type: boolean
          description: Whether additional results exist beyond this page.
        next_after:
          type: string
          description: |
            Cursor value to pass as the `after` query parameter for the next page.
            Only present when `has_more` is `true`.
        limit:
          type: integer
          description: The limit that was applied to this request.

    # ========================================================================
    # Address (shared value object)
    # ========================================================================
    Address:
      type: object
      required: [line1, city, state, postal_code, country]
      properties:
        line1:
          type: string
          maxLength: 100
          description: Street address line 1.
        line2:
          type: string
          maxLength: 100
          description: Street address line 2 (apt, suite, unit, etc.).
        city:
          type: string
          maxLength: 50
        state:
          type: string
          minLength: 2
          maxLength: 2
          description: Two-letter US state or territory code (ISO 3166-2:US).
        postal_code:
          type: string
          pattern: '^\d{5}(-\d{4})?$'
          description: US ZIP code (5-digit or ZIP+4).
        country:
          type: string
          minLength: 2
          maxLength: 2
          default: US
          description: ISO 3166-1 alpha-2 country code.

    # ========================================================================
    # Entity — Unified Namespace (Decision 1, 7)
    # ========================================================================

    # --- Enums ---
    EntityType:
      type: string
      enum: [person, business, trust, joint]
      description: Entity type discriminator.

    EntityStatus:
      type: string
      enum: [pending, active, disabled, archived]
      description: |
        Entity lifecycle state.
        ```
        PENDING → ACTIVE ↔ DISABLED → ARCHIVED
        ```
        - `pending` — Entity created, awaiting KYC/KYB verification.
        - `active` — Verified and operational.
        - `disabled` — Temporarily suspended (reversible).
        - `archived` — Permanently closed (terminal).

    LockType:
      type: string
      enum: [none, compliance, fraud, legal, admin]
      description: |
        Orthogonal lock applied independently of entity status.
        When lock_type is not `none`, the entity is restricted from certain operations
        even if status is `active`. Multiple lock types cannot stack — the most
        restrictive active lock takes precedence at the application layer.

    # --- Base Entity (read-only, returned in all responses) ---
    EntityBase:
      type: object
      description: |
        Fields common to all entity types. Present in every entity response.
        Use the `type` discriminator to determine which type-specific fields are populated.
      required:
        - id
        - type
        - status
        - lock_type
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^ent_[a-zA-Z0-9]{20}$'
          description: Unique entity identifier.
          examples:
            - ent_7kFb2mNqRsT9xLpW4vYz
        type:
          $ref: "#/components/schemas/EntityType"
        status:
          $ref: "#/components/schemas/EntityStatus"
        lock_type:
          $ref: "#/components/schemas/LockType"
        kyc_status:
          type: string
          enum: [not_started, pending, approved, denied, expired]
          readOnly: true
          description: Current verification status (driven by KYC/KYB provider integration).
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
          description: |
            Arbitrary key-value pairs for partner use. Keys max 40 chars, values max 500 chars.
            Not used by the control engine or compliance reporting.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Person ---
    PersonFields:
      type: object
      description: "Fields specific to type `person`."
      required:
        - name_first
        - name_last
        - date_of_birth
        - ssn
        - address
      properties:
        name_first:
          type: string
          maxLength: 50
        name_last:
          type: string
          maxLength: 50
        name_middle:
          type: string
          maxLength: 50
        name_suffix:
          type: string
          maxLength: 10
          description: e.g., Jr., Sr., III.
        date_of_birth:
          type: string
          format: date
          description: ISO 8601 date (YYYY-MM-DD). Must be at least 18 years old.
        ssn:
          type: string
          pattern: '^\d{3}-\d{2}-\d{4}$'
          description: |
            Social Security Number. Write-once — cannot be updated after creation.
            Returned masked in responses (`***-**-6789`) except in compliance-scoped requests.
          x-pii: true
          x-write-once: true
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          pattern: '^\+1\d{10}$'
          description: US phone number in E.164 format.
        address:
          $ref: "#/components/schemas/Address"
        citizenship_country:
          type: string
          minLength: 2
          maxLength: 2
          default: US
          description: ISO 3166-1 alpha-2. Required for CDD (CD-01).

    CreatePerson:
      allOf:
        - $ref: "#/components/schemas/PersonFields"
        - type: object
          properties:
            metadata:
              type: object
              additionalProperties:
                type: string
              maxProperties: 50

    Person:
      description: A natural person entity.
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - $ref: "#/components/schemas/PersonFields"
        - type: object
          properties:
            type:
              const: person

    # --- Business ---
    BeneficialOwner:
      type: object
      description: |
        A person with ≥25% ownership in the business (FinCEN threshold).
        References an existing person entity.
      required:
        - entity_id
        - ownership_percentage
        - title
      properties:
        entity_id:
          type: string
          description: ID of the person entity representing this beneficial owner.
        ownership_percentage:
          type: number
          format: float
          minimum: 25
          maximum: 100
          description: Ownership percentage (must be ≥ 25% to qualify as beneficial owner).
        title:
          type: string
          maxLength: 100
          description: Role or title at the business (e.g., "CEO", "Managing Member").
        is_control_person:
          type: boolean
          default: false
          description: Whether this person has significant control over the business.

    BusinessFields:
      type: object
      description: "Fields specific to type `business`."
      required:
        - legal_name
        - ein
        - business_type
        - formation_date
        - formation_state
        - address
        - beneficial_owners
      properties:
        legal_name:
          type: string
          maxLength: 200
        dba_name:
          type: string
          maxLength: 200
          description: Doing Business As name, if different from legal name.
        ein:
          type: string
          pattern: '^\d{2}-\d{7}$'
          description: |
            Employer Identification Number (XX-XXXXXXX).
            Write-once — cannot be updated after creation.
            Returned masked in responses (`**-***4567`) except in compliance-scoped requests.
          x-pii: true
          x-write-once: true
        business_type:
          type: string
          enum:
            - sole_proprietorship
            - partnership
            - llc
            - corporation
            - s_corporation
            - nonprofit
            - government
            - other
        naics_code:
          type: string
          pattern: '^\d{6}$'
          description: 6-digit NAICS industry classification code.
        formation_date:
          type: string
          format: date
        formation_state:
          type: string
          minLength: 2
          maxLength: 2
          description: Two-letter US state code where the business was formed.
        address:
          $ref: "#/components/schemas/Address"
        phone:
          type: string
          pattern: '^\+1\d{10}$'
        website:
          type: string
          format: uri
          maxLength: 500
        beneficial_owners:
          type: array
          items:
            $ref: "#/components/schemas/BeneficialOwner"
          minItems: 1
          description: |
            All persons with ≥25% ownership. At least one beneficial owner is required
            per FinCEN beneficial ownership rule. Each must reference an existing person entity.

    CreateBusiness:
      allOf:
        - $ref: "#/components/schemas/BusinessFields"
        - type: object
          properties:
            metadata:
              type: object
              additionalProperties:
                type: string
              maxProperties: 50

    Business:
      description: A business entity (LLC, corporation, etc.).
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - $ref: "#/components/schemas/BusinessFields"
        - type: object
          properties:
            type:
              const: business

    # --- Trust ---
    TrustRole:
      type: object
      description: A person associated with the trust in a specific role.
      required:
        - entity_id
        - role
      properties:
        entity_id:
          type: string
          description: ID of the person entity.
        role:
          type: string
          enum: [trustee, beneficiary, grantor, successor_trustee, protector]
          description: The person's role in the trust.

    TrustFields:
      type: object
      description: "Fields specific to type `trust`."
      required:
        - trust_name
        - trust_type
        - formation_date
        - ein
        - address
        - associated_persons
      properties:
        trust_name:
          type: string
          maxLength: 200
        trust_type:
          type: string
          enum: [revocable, irrevocable]
        formation_date:
          type: string
          format: date
        ein:
          type: string
          pattern: '^\d{2}-\d{7}$'
          description: Trust EIN. Revocable trusts may use the grantor's SSN instead — in that case, provide the grantor's SSN here.
          x-pii: true
          x-write-once: true
        address:
          $ref: "#/components/schemas/Address"
        associated_persons:
          type: array
          items:
            $ref: "#/components/schemas/TrustRole"
          minItems: 1
          description: |
            All persons associated with the trust. Must include at least one trustee
            and at least one grantor. Each must reference an existing person entity.

    CreateTrust:
      allOf:
        - $ref: "#/components/schemas/TrustFields"
        - type: object
          properties:
            metadata:
              type: object
              additionalProperties:
                type: string
              maxProperties: 50

    Trust:
      description: A trust entity (revocable or irrevocable).
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - $ref: "#/components/schemas/TrustFields"
        - type: object
          properties:
            type:
              const: trust

    # --- Joint ---
    JointFields:
      type: object
      description: |
        Fields specific to `type: joint`. Represents a joint relationship between
        two or more persons. The actual joint account ownership is modeled via the
        `owners[]` array on Account — the joint entity groups the persons for
        CDD and BSA purposes.
      required:
        - joint_type
        - members
      properties:
        joint_type:
          type: string
          enum: [joint_tenants_with_rights_of_survivorship, tenants_in_common]
          description: Legal structure of the joint relationship.
        members:
          type: array
          items:
            type: object
            required: [entity_id]
            properties:
              entity_id:
                type: string
                description: ID of a person entity in this joint relationship.
          minItems: 2
          maxItems: 10
          description: |
            Person entities in this joint relationship. All members must have
            `kyc_status: approved` before the joint entity can become `active`.

    CreateJoint:
      allOf:
        - $ref: "#/components/schemas/JointFields"
        - type: object
          properties:
            metadata:
              type: object
              additionalProperties:
                type: string
              maxProperties: 50

    Joint:
      description: A joint entity representing a relationship between two or more persons.
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - $ref: "#/components/schemas/JointFields"
        - type: object
          properties:
            type:
              const: joint

    # --- Polymorphic Entity (discriminated union for list/get responses) ---
    Entity:
      description: |
        Discriminated union of all entity types. Use the `type` field to determine
        which type-specific fields are present.
      oneOf:
        - $ref: "#/components/schemas/Person"
        - $ref: "#/components/schemas/Business"
        - $ref: "#/components/schemas/Trust"
        - $ref: "#/components/schemas/Joint"
      discriminator:
        propertyName: type
        mapping:
          person: "#/components/schemas/Person"
          business: "#/components/schemas/Business"
          trust: "#/components/schemas/Trust"
          joint: "#/components/schemas/Joint"

    # --- Update Schemas (PATCH — partial updates, immutable fields excluded) ---
    UpdatePerson:
      type: object
      description: |
        Partial update for a person entity. Only provided fields are updated.
        Write-once fields (`ssn`) cannot be modified. Status transitions use
        dedicated action endpoints.
      properties:
        name_first:
          type: string
          maxLength: 50
        name_last:
          type: string
          maxLength: 50
        name_middle:
          type: string
          maxLength: 50
        name_suffix:
          type: string
          maxLength: 10
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          pattern: '^\+1\d{10}$'
        address:
          $ref: "#/components/schemas/Address"
        citizenship_country:
          type: string
          minLength: 2
          maxLength: 2
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    UpdateBusiness:
      type: object
      description: |
        Partial update for a business entity. Write-once fields (`ein`) cannot be modified.
      properties:
        legal_name:
          type: string
          maxLength: 200
        dba_name:
          type: string
          maxLength: 200
        business_type:
          type: string
          enum:
            - sole_proprietorship
            - partnership
            - llc
            - corporation
            - s_corporation
            - nonprofit
            - government
            - other
        naics_code:
          type: string
          pattern: '^\d{6}$'
        address:
          $ref: "#/components/schemas/Address"
        phone:
          type: string
          pattern: '^\+1\d{10}$'
        website:
          type: string
          format: uri
          maxLength: 500
        beneficial_owners:
          type: array
          items:
            $ref: "#/components/schemas/BeneficialOwner"
          minItems: 1
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    UpdateTrust:
      type: object
      description: |
        Partial update for a trust entity. Write-once fields (`ein`) cannot be modified.
      properties:
        trust_name:
          type: string
          maxLength: 200
        address:
          $ref: "#/components/schemas/Address"
        associated_persons:
          type: array
          items:
            $ref: "#/components/schemas/TrustRole"
          minItems: 1
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    UpdateJoint:
      type: object
      description: |
        Partial update for a joint entity. Members can be added or removed
        (minimum 2 members enforced).
      properties:
        members:
          type: array
          items:
            type: object
            required: [entity_id]
            properties:
              entity_id:
                type: string
          minItems: 2
          maxItems: 10
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Entity List Response ---
    EntityList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # --- Status Transition Request ---
    EntityStatusTransition:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [activate, disable, archive]
          description: |
            Requested status transition.
            - `activate` — Move from `pending` or `disabled` to `active`. Requires `kyc_status: approved`.
            - `disable` — Move from `active` to `disabled`. Reversible.
            - `archive` — Move from `disabled` to `archived`. Terminal, irreversible.
        reason:
          type: string
          maxLength: 500
          description: Required for `disable` and `archive` actions. Recorded in audit log.

    # --- Lock Request ---
    EntityLockUpdate:
      type: object
      required: [lock_type]
      properties:
        lock_type:
          $ref: "#/components/schemas/LockType"
        reason:
          type: string
          maxLength: 500
          description: Required when lock_type is not `none`. Recorded in audit log.

    # ========================================================================
    # Account (Decision 2, 3, 7)
    # ========================================================================

    # --- Enums ---
    AccountType:
      type: string
      enum: [checking, savings, money_market]
      description: |
        Ledger account type. Maps to 5300 account codes via the bookkeeping layer.
        - `checking` — Share draft account (5300 code 025B)
        - `savings` — Regular share account (5300 code 010)
        - `money_market` — Money market share (5300 code 012)

    AccountStatus:
      type: string
      enum: [open, frozen, closed]
      description: |
        Account lifecycle state.
        - `open` — Active and operational.
        - `frozen` — Temporarily suspended (no debits; credits may still post). Reversible.
        - `closed` — Permanently closed (terminal). Balance must be zero.
        Transitions: OPEN to/from FROZEN, FROZEN to CLOSED, OPEN to CLOSED.

    DormancyStatus:
      type: string
      enum: [active, dormant, abandoned]
      description: |
        Orthogonal dormancy classification, tracked independently of account status.
        Driven by state-specific inactivity periods (typically 12 months dormant,
        3-5 years abandoned). Controls CD-07 (Dormancy Monitoring) and
        CD-08 (Escheatment) evaluate this flag.

    FboClassification:
      type: string
      enum: [customer_balance, commingled_cash, settlement]
      description: |
        FBO sub-account classification for the bookkeeping layer.
        - `customer_balance` — Holds attributed to a specific end-user entity.
        - `commingled_cash` — Pooled operational funds (e.g., partner float).
        - `settlement` — Funds in transit for Fed settlement.

    # --- Blnk Balance Fields (read-only, sourced from Blnk Deploy) ---
    BlnkBalances:
      type: object
      readOnly: true
      description: |
        Balance fields sourced from the Blnk Deploy ledger. These are read-only
        computed values — all mutations happen through transaction endpoints.
        Amounts are in the smallest currency unit (cents for USD).
      x-source: blnk
      properties:
        balance:
          type: integer
          format: int64
          readOnly: true
          description: Current available balance (cents). Credits minus debits, excluding inflight.
          x-source: blnk
        credit_balance:
          type: integer
          format: int64
          readOnly: true
          description: Lifetime credit total (cents).
          x-source: blnk
        debit_balance:
          type: integer
          format: int64
          readOnly: true
          description: Lifetime debit total (cents).
          x-source: blnk
        inflight_balance:
          type: integer
          format: int64
          readOnly: true
          description: |
            Net pending transaction amount (cents). Represents authorized but
            unsettled transactions (e.g., card authorizations). Managed by Blnk's
            QUEUED to INFLIGHT to APPLIED/VOID/REJECTED lifecycle.
          x-source: blnk
        inflight_credit_balance:
          type: integer
          format: int64
          readOnly: true
          description: Pending inbound credits (cents).
          x-source: blnk
        inflight_debit_balance:
          type: integer
          format: int64
          readOnly: true
          description: Pending outbound debits (cents).
          x-source: blnk

    # --- Bookkeeping Tags (our shadow layer, Decision 3) ---
    BookkeepingTags:
      type: object
      description: |
        Shadow bookkeeping layer fields for 5300 regulatory reporting and FBO
        segregation. These are managed by Cassandra, not sourced from Blnk.
      properties:
        account_code_5300:
          type: string
          description: |
            NCUA 5300 account code (e.g., 025B for share drafts, 010 for
            regular shares). Assigned automatically based on account type;
            overridable by compliance officer.
          examples:
            - "025B"
            - "010"
            - "012"
        schedule_a_code:
          type: string
          description: |
            5300 Schedule A line item code for balance sheet classification.
            Used by the 5300 Reporter consumer for aggregated reporting.
          examples:
            - "schedule_a.assets.cash"
            - "schedule_a.shares.regular"
        fbo_classification:
          $ref: "#/components/schemas/FboClassification"
        locked_amount:
          type: integer
          format: int64
          readOnly: true
          description: |
            Amount held by BSA/compliance controls (cents). Separate from Blnk
            inflight holds — this represents funds frozen by the control engine
            (e.g., BA-05 OFAC match, fraud investigation). Reduces effective
            available balance as effective_available = balance - locked_amount.

    # --- Account Owner ---
    AccountOwner:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          description: |
            ID of the owning entity. Can be a person, business, trust, or joint entity.
            For joint accounts, reference the joint entity — its members are the
            beneficial owners. Multiple owners are supported for complex structures
            (e.g., a business account with a personal guarantor).
        role:
          type: string
          enum: [primary, authorized_signer, beneficiary, guarantor]
          default: primary
          description: The owner's role on this account.

    # --- Account Number Summary (embedded in Account response) ---
    AccountNumberSummary:
      type: object
      description: Abbreviated account number info embedded in the Account response.
      properties:
        id:
          type: string
          readOnly: true
        account_number_masked:
          type: string
          readOnly: true
          description: "Masked account number showing only the check digit."
        routing_number:
          type: string
          readOnly: true
        status:
          $ref: "#/components/schemas/AccountNumberStatus"

    # --- Account (full response) ---
    Account:
      type: object
      required:
        - id
        - entity_id
        - account_type
        - status
        - lock_type
        - dormancy_status
        - currency
        - balances
        - bookkeeping
        - owners
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^acct_[a-zA-Z0-9]{20}$'
          description: Unique account identifier.
          examples:
            - acct_3rTv8mKqWsN5xLpJ7bYz
        entity_id:
          type: string
          description: |
            Primary owning entity. Immutable after creation. This is the entity
            under which the account appears for 5300 reporting and BSA monitoring.
        account_type:
          $ref: "#/components/schemas/AccountType"
        status:
          $ref: "#/components/schemas/AccountStatus"
        lock_type:
          $ref: "#/components/schemas/LockType"
        dormancy_status:
          $ref: "#/components/schemas/DormancyStatus"
        currency:
          type: string
          const: USD
          description: ISO 4217 currency code. Only USD supported.
        balances:
          $ref: "#/components/schemas/BlnkBalances"
        bookkeeping:
          $ref: "#/components/schemas/BookkeepingTags"
        owners:
          type: array
          items:
            $ref: "#/components/schemas/AccountOwner"
          minItems: 1
          description: |
            All entities with ownership or authority over this account.
            At minimum, includes the primary owner matching entity_id.
            Joint ownership is modeled here, not at the entity level.
        blnk_ledger_id:
          type: string
          readOnly: true
          description: Corresponding ledger ID in Blnk Deploy. Opaque reference for reconciliation.
          x-source: blnk
        account_numbers:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/AccountNumberSummary"
          description: |
            Summary of account numbers associated with this account.
            Use the Account Numbers endpoints for full details and management.
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
          description: Arbitrary key-value pairs for partner use.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Create Account ---
    CreateAccount:
      type: object
      required:
        - entity_id
        - account_type
      properties:
        entity_id:
          type: string
          description: |
            Primary owning entity. Must be in active status with kyc_status approved.
            Immutable after creation.
        account_type:
          $ref: "#/components/schemas/AccountType"
        owners:
          type: array
          items:
            $ref: "#/components/schemas/AccountOwner"
          description: |
            Additional owners beyond the primary entity. If omitted, the account
            is created with a single primary owner matching entity_id.
        bookkeeping:
          type: object
          description: |
            Optional bookkeeping overrides. If omitted, 5300 codes are assigned
            automatically based on account_type.
          properties:
            account_code_5300:
              type: string
            schedule_a_code:
              type: string
            fbo_classification:
              $ref: "#/components/schemas/FboClassification"
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Update Account ---
    UpdateAccount:
      type: object
      description: |
        Partial update for an account. Immutable fields (entity_id, account_type,
        currency) cannot be changed. Status and lock transitions use dedicated
        action endpoints.
      properties:
        owners:
          type: array
          items:
            $ref: "#/components/schemas/AccountOwner"
          minItems: 1
          description: |
            Replace the full owners list. Must include at least one primary owner.
            All referenced entities must exist and be in active status.
        bookkeeping:
          type: object
          properties:
            account_code_5300:
              type: string
            schedule_a_code:
              type: string
            fbo_classification:
              $ref: "#/components/schemas/FboClassification"
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Account List ---
    AccountList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # --- Account Status Transition ---
    AccountStatusTransition:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [freeze, unfreeze, close]
          description: |
            Requested status transition.
            - `freeze` — Move from open to frozen. Debits blocked; credits may still post.
            - `unfreeze` — Move from frozen to open.
            - `close` — Move from open or frozen to closed. Terminal. Balance must be zero.
        reason:
          type: string
          maxLength: 500
          description: Required for all transitions. Recorded in audit log.

    # ========================================================================
    # Account Number (Decision 2, 20)
    # ========================================================================

    # --- Enums ---
    AccountNumberStatus:
      type: string
      enum: [active, disabled, canceled]
      description: |
        Account number lifecycle state.
        - `active` — Routable. Inbound payments accepted, outbound allowed.
        - `disabled` — Temporarily non-routable (reversible). Inbound payments rejected.
        - `canceled` — Permanently deactivated (terminal). Number is never reused.
        Transitions: ACTIVE to/from DISABLED, ACTIVE or DISABLED to CANCELED.

    # --- Account Number (full response) ---
    AccountNumber:
      type: object
      required:
        - id
        - account_id
        - account_number
        - routing_number
        - status
        - informational_entity_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^acctnum_[a-zA-Z0-9]{20}$'
          description: Unique account number resource identifier.
          examples:
            - acctnum_9kHb4mNqRsT2xLpW6vYz
        account_id:
          type: string
          description: The ledger account this number is associated with. Immutable.
        account_number:
          type: string
          readOnly: true
          pattern: '^\d{12}$'
          description: |
            12-digit account number allocated by the aggregator.
            Format is PPP-SSSSSSSS-C where P is the 3-digit fintech prefix,
            S is the 8-digit sequence, and C is the Luhn check digit.
            Displayed with dashes for readability; transmitted as 12 contiguous
            digits in ACH/wire files. Never reused.
          examples:
            - "001000000019"
        routing_number:
          type: string
          readOnly: true
          pattern: '^\d{9}$'
          description: |
            ABA routing number. All account numbers within a credit union share the
            same routing number (the credit union's Fed master account routing number).
            Inbound payments are routed to the correct fintech instance by the
            aggregator using the 3-digit account number prefix.
          examples:
            - "271070801"
        status:
          $ref: "#/components/schemas/AccountNumberStatus"
        informational_entity_id:
          type: string
          description: |
            Entity ID for FBO attribution. Typically matches the account's primary
            owner but can differ in BaaS scenarios where the fintech partner is the
            account holder and end-users are tracked at the account number level.
            Used by the bookkeeping layer for per-entity FBO segregation and
            BSA monitoring at the account number level.
        label:
          type: string
          maxLength: 100
          description: |
            Human-readable label for this account number (e.g., Primary Checking,
            Partner A Routing). For partner reference only, not used in payment files.
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Create Account Number ---
    CreateAccountNumber:
      type: object
      required:
        - informational_entity_id
      properties:
        informational_entity_id:
          type: string
          description: |
            Entity ID for FBO attribution on this account number.
            Must reference an existing entity in active status.
        label:
          type: string
          maxLength: 100
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Update Account Number ---
    UpdateAccountNumber:
      type: object
      description: |
        Partial update for an account number. Only label, informational_entity_id,
        and metadata can be modified. Status transitions use the dedicated action endpoint.
      properties:
        informational_entity_id:
          type: string
          description: Must reference an existing entity in active status.
        label:
          type: string
          maxLength: 100
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Account Number List ---
    AccountNumberList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccountNumber"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # --- Account Number Status Transition ---
    AccountNumberStatusTransition:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [disable, enable, cancel]
          description: |
            Requested status transition.
            - `disable` — Move from active to disabled. Inbound payments rejected.
            - `enable` — Move from disabled to active.
            - `cancel` — Move to canceled from any state. Terminal. Number never reused.
        reason:
          type: string
          maxLength: 500
          description: Required for all transitions. Recorded in audit log.

    # ========================================================================
    # ACH Transfer (Decision 7, 8)
    # ========================================================================

    # --- Enums ---
    AchTransferStatus:
      type: string
      enum:
        - pending_approval
        - submitted
        - settled
        - returned
        - rejected
        - canceled
      description: |
        ACH transfer lifecycle state.
        - `pending_approval` — Created, awaiting control engine evaluation.
        - `submitted` — Controls passed, ACH file submitted to Fed.
        - `settled` — Funds have settled at the Fed.
        - `returned` — Settled transfer was returned by receiving bank.
        - `rejected` — Control engine rejected the transfer (never submitted).
        - `canceled` — Canceled after submission but before settlement.
        Transitions: PENDING_APPROVAL to SUBMITTED or REJECTED, SUBMITTED to SETTLED or CANCELED, SETTLED to RETURNED.

    AchDirection:
      type: string
      enum: [credit, debit]
      description: |
        Direction of the ACH transfer from the perspective of this account.
        - `credit` — Push money out (originate a payment to an external party).
        - `debit` — Pull money in (originate a collection from an external party).

    AchWindow:
      type: string
      enum: [standard, same_day]
      description: |
        ACH processing window.
        - `standard` — Next-day settlement (standard ACH).
        - `same_day` — Same-day ACH (additional fee may apply, cutoff times enforced).

    # --- ACH Counterparty ---
    AchCounterparty:
      type: object
      required:
        - routing_number
        - account_number
        - account_type
        - name
      properties:
        routing_number:
          type: string
          pattern: '^\d{9}$'
          description: ABA routing number of the receiving institution.
        account_number:
          type: string
          maxLength: 17
          description: Account number at the receiving institution.
        account_type:
          type: string
          enum: [checking, savings]
          description: Account type at the receiving institution.
        name:
          type: string
          maxLength: 22
          description: |
            Receiver name as it will appear in the ACH file.
            Max 22 characters per NACHA format.

    # --- Control Result (returned on gated operations) ---
    ControlResult:
      type: object
      description: |
        Result of a control engine evaluation on this operation. Included in
        responses for all gated endpoints so the partner can see which controls
        ran and their outcomes.
      properties:
        control_id:
          type: string
          description: Control identifier (e.g., BA-05, BA-07, VL-01).
        control_name:
          type: string
          description: Human-readable control name.
        verdict:
          type: string
          enum: [pass, fail, flag, not_applicable]
          description: |
            - `pass` — Control conditions satisfied.
            - `fail` — Control blocked the operation.
            - `flag` — Control raised an alert but did not block (e.g., suspicious but below threshold).
            - `not_applicable` — Control was not relevant to this operation.
        detail:
          type: string
          description: Human-readable explanation of the verdict.

    # --- ACH Transfer (full response) ---
    AchTransfer:
      type: object
      required:
        - id
        - account_id
        - account_number_id
        - direction
        - amount
        - currency
        - status
        - window
        - counterparty
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^ach_[a-zA-Z0-9]{20}$'
          description: Unique ACH transfer identifier.
          examples:
            - ach_5kRb3mNqWsT8xLpJ2vYz
        account_id:
          type: string
          description: The ledger account being debited or credited.
        account_number_id:
          type: string
          description: |
            The specific account number used for this transfer. Determines the
            routing/account number pair that appears in the ACH file.
        direction:
          $ref: "#/components/schemas/AchDirection"
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents. Must be positive.
        currency:
          type: string
          const: USD
        status:
          $ref: "#/components/schemas/AchTransferStatus"
        window:
          $ref: "#/components/schemas/AchWindow"
        counterparty:
          $ref: "#/components/schemas/AchCounterparty"
        description:
          type: string
          maxLength: 10
          description: |
            Company entry description in the ACH batch header.
            Max 10 characters per NACHA format (e.g., "PAYROLL", "PAYMENT").
        company_name:
          type: string
          maxLength: 16
          description: |
            Originator company name in the ACH batch header.
            Max 16 characters per NACHA format. Defaults to partner's registered name.
        effective_date:
          type: string
          format: date
          readOnly: true
          description: |
            The date the transfer will settle at the Fed. Set by the system based
            on the processing window and submission time. For same-day ACH, this is
            today (if before cutoff) or next business day.
        expected_settlement:
          type: string
          format: date-time
          readOnly: true
          description: |
            Estimated settlement timestamp. More precise than effective_date —
            accounts for Fed processing windows, weekends, and holidays.
        settled_at:
          type: string
          format: date-time
          readOnly: true
          description: Actual settlement timestamp. Populated when status becomes `settled`.
        returned_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp of the return. Populated when status becomes `returned`.
        return_code:
          type: string
          readOnly: true
          description: |
            NACHA return reason code (e.g., R01 Insufficient Funds, R02 Account Closed,
            R03 No Account, R04 Invalid Account Number). Only present when status is `returned`.
          examples:
            - "R01"
            - "R02"
            - "R03"
        return_reason:
          type: string
          readOnly: true
          description: Human-readable return reason. Only present when status is `returned`.
        rejection_reason:
          type: string
          readOnly: true
          description: |
            Explanation of why the control engine rejected this transfer.
            Only present when status is `rejected`.
        control_results:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/ControlResult"
          description: |
            Results of all control engine evaluations for this transfer.
            Populated at creation time (when the control engine gates the transfer).
        blnk_transaction_id:
          type: string
          readOnly: true
          description: Corresponding transaction ID in Blnk Deploy.
          x-source: blnk
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Create ACH Transfer ---
    CreateAchTransfer:
      type: object
      required:
        - account_id
        - direction
        - amount
        - counterparty
      properties:
        account_id:
          type: string
          description: |
            The ledger account to debit (for credits) or credit (for debits).
            Must be in `open` status with no blocking lock.
        account_number_id:
          type: string
          description: |
            Specific account number to use. If omitted, the account's primary
            (first created) account number is used.
        direction:
          $ref: "#/components/schemas/AchDirection"
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents.
        counterparty:
          $ref: "#/components/schemas/AchCounterparty"
        window:
          $ref: "#/components/schemas/AchWindow"
        description:
          type: string
          maxLength: 10
          description: Company entry description for the ACH batch header.
        company_name:
          type: string
          maxLength: 16
          description: Originator company name for the ACH batch header.
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- ACH Transfer List ---
    AchTransferList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AchTransfer"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # --- ACH Batch Item ---
    AchBatchItem:
      type: object
      required:
        - account_id
        - direction
        - amount
        - counterparty
      description: |
        A single transfer within a batch ACH submission. Same fields as
        CreateAchTransfer plus a partner-provided `reference` for correlation.
      properties:
        reference:
          type: string
          maxLength: 100
          description: |
            Partner-provided reference for correlating batch results to input items.
            Returned in the batch response and in webhook events.
        account_id:
          type: string
        account_number_id:
          type: string
        direction:
          $ref: "#/components/schemas/AchDirection"
        amount:
          type: integer
          format: int64
          minimum: 1
        counterparty:
          $ref: "#/components/schemas/AchCounterparty"
        description:
          type: string
          maxLength: 10
        company_name:
          type: string
          maxLength: 16
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Create ACH Batch ---
    CreateAchBatch:
      type: object
      required:
        - transfers
      properties:
        window:
          $ref: "#/components/schemas/AchWindow"
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/AchBatchItem"
          minItems: 1
          maxItems: 5000
          description: |
            Array of individual ACH transfers to submit as a single NACHA batch.
            Each transfer is evaluated independently by the control engine.
            Individual items may be rejected while others succeed.

    # --- ACH Batch Result Item ---
    AchBatchResultItem:
      type: object
      properties:
        reference:
          type: string
          description: The partner-provided reference from the input item.
        transfer:
          $ref: "#/components/schemas/AchTransfer"
        error:
          $ref: "#/components/schemas/Error"
        succeeded:
          type: boolean
          description: Whether this individual transfer was accepted.

    # --- ACH Batch Response ---
    AchBatchResponse:
      type: object
      required:
        - batch_id
        - total_count
        - accepted_count
        - rejected_count
        - results
      properties:
        batch_id:
          type: string
          readOnly: true
          pattern: '^achbatch_[a-zA-Z0-9]{20}$'
          description: Unique batch identifier.
        total_count:
          type: integer
          description: Total number of transfers in the batch.
        accepted_count:
          type: integer
          description: Number of transfers accepted (created in pending_approval or submitted).
        rejected_count:
          type: integer
          description: Number of transfers rejected by validation or control engine.
        total_amount:
          type: integer
          format: int64
          description: Sum of all accepted transfer amounts in cents.
        results:
          type: array
          items:
            $ref: "#/components/schemas/AchBatchResultItem"

    # ========================================================================
    # Book Transfer (Decision 8 — on-us instant transfers)
    # ========================================================================

    BookTransferStatus:
      type: string
      enum: [pending, completed, rejected]
      description: |
        Book transfer lifecycle state.
        - `pending` — Created, control engine evaluating.
        - `completed` — Funds moved instantly (both sides settled).
        - `rejected` — Control engine rejected the transfer.
        Book transfers are instant and on-us, so there is no submitted/returned flow.

    # --- Book Transfer (full response) ---
    BookTransfer:
      type: object
      required:
        - id
        - source_account_id
        - destination_account_id
        - amount
        - currency
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^book_[a-zA-Z0-9]{20}$'
          description: Unique book transfer identifier.
          examples:
            - book_7kFb2mNqRsT9xLpW4vYz
        source_account_id:
          type: string
          description: The account being debited.
        destination_account_id:
          type: string
          description: The account being credited.
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents.
        currency:
          type: string
          const: USD
        status:
          $ref: "#/components/schemas/BookTransferStatus"
        description:
          type: string
          maxLength: 140
          description: Free-text description of the transfer purpose.
        rejection_reason:
          type: string
          readOnly: true
          description: |
            Explanation of why the control engine rejected this transfer.
            Only present when status is `rejected`.
        control_results:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/ControlResult"
          description: Results of control engine evaluations.
        blnk_transaction_id:
          type: string
          readOnly: true
          description: Corresponding transaction ID in Blnk Deploy.
          x-source: blnk
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Create Book Transfer ---
    CreateBookTransfer:
      type: object
      required:
        - source_account_id
        - destination_account_id
        - amount
      properties:
        source_account_id:
          type: string
          description: |
            Account to debit. Must be `open`, no blocking lock, and sufficient
            available balance (balance minus locked_amount minus inflight_debit_balance).
        destination_account_id:
          type: string
          description: |
            Account to credit. Must be `open` or `frozen` (frozen accounts accept
            credits). Must be in the same fintech instance as the source.
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents.
        description:
          type: string
          maxLength: 140
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Book Transfer List ---
    BookTransferList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BookTransfer"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ========================================================================
    # Wire Transfer (Decision 9)
    # ========================================================================

    # --- Enums ---
    WireTransferStatus:
      type: string
      enum:
        - pending_approval
        - submitted
        - completed
        - return_requested
        - returned
        - rejected
        - canceled
      description: |
        Wire transfer lifecycle state.
        - `pending_approval` — Created, awaiting control engine evaluation.
        - `submitted` — Controls passed, Fedwire message submitted.
        - `completed` — Wire completed (funds irrevocably transferred).
        - `return_requested` — A return has been requested after completion.
        - `returned` — Return request honored by receiving bank; funds returned.
        - `rejected` — Control engine rejected the transfer (never submitted).
        - `canceled` — Canceled after submission but before completion.
        Transitions: PENDING_APPROVAL to SUBMITTED or REJECTED,
        SUBMITTED to COMPLETED or CANCELED,
        COMPLETED to RETURN_REQUESTED,
        RETURN_REQUESTED to RETURNED or COMPLETED (request denied).

    WireDirection:
      type: string
      enum: [outbound, inbound]
      description: |
        Direction of the wire transfer.
        - `outbound` — Originated by this instance, sending funds via Fedwire.
        - `inbound` — Received from an external bank via Fedwire, routed by the
          aggregator to this instance based on account number prefix.

    WireReturnRequestReason:
      type: string
      enum: [fraud, duplicate, incorrect_amount, incorrect_beneficiary]
      description: |
        Reason for requesting a wire return. Per Decision 9, only these four
        reasons are supported. Wire returns are requests, not guarantees —
        the receiving bank may deny the return.

    # --- Wire Beneficiary ---
    WireBeneficiary:
      type: object
      required:
        - name
        - routing_number
        - account_number
      description: The receiving party and their bank details for an outbound wire.
      properties:
        name:
          type: string
          maxLength: 35
          description: Beneficiary name as it will appear on the Fedwire message.
        routing_number:
          type: string
          pattern: '^\d{9}$'
          description: ABA routing number of the beneficiary's bank.
        account_number:
          type: string
          maxLength: 34
          description: Account number at the beneficiary's bank.
        bank_name:
          type: string
          maxLength: 35
          description: |
            Name of the beneficiary's bank. Optional — if omitted, resolved
            automatically from the routing number via the Fed directory.
        address:
          $ref: "#/components/schemas/Address"

    # --- Wire Originator Info (for inbound wires) ---
    WireOriginator:
      type: object
      readOnly: true
      description: |
        Originator information from an inbound Fedwire message. Read-only —
        populated by the aggregator when routing an inbound wire.
      properties:
        name:
          type: string
        routing_number:
          type: string
        account_number:
          type: string
        bank_name:
          type: string
        reference:
          type: string
          description: Originator-to-beneficiary information (OBI) from the Fedwire message.

    # --- Wire Transfer (full response) ---
    WireTransfer:
      type: object
      required:
        - id
        - account_id
        - account_number_id
        - direction
        - amount
        - currency
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          readOnly: true
          pattern: '^wire_[a-zA-Z0-9]{20}$'
          description: Unique wire transfer identifier.
          examples:
            - wire_4nRb7mKqWsT3xLpJ9vYz
        account_id:
          type: string
          description: The ledger account being debited (outbound) or credited (inbound).
        account_number_id:
          type: string
          description: The account number used for this wire.
        direction:
          $ref: "#/components/schemas/WireDirection"
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents.
        currency:
          type: string
          const: USD
        status:
          $ref: "#/components/schemas/WireTransferStatus"
        beneficiary:
          $ref: "#/components/schemas/WireBeneficiary"
        originator:
          $ref: "#/components/schemas/WireOriginator"
        purpose:
          type: string
          maxLength: 140
          description: |
            Originator-to-beneficiary information (OBI). Free-text description
            of the wire purpose, included in the Fedwire message.
        imad:
          type: string
          readOnly: true
          description: |
            Input Message Accountability Data — the Fed's unique identifier for
            this Fedwire message. Populated after submission. Used for tracing
            and return requests.
          examples:
            - "20260313B1Q2R3S400000001"
        omad:
          type: string
          readOnly: true
          description: |
            Output Message Accountability Data — assigned by the receiving Fed
            bank. Populated after the wire is acknowledged.
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the Fedwire message was submitted.
        completed_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the wire completed. Wires are typically same-day.
        return_request:
          readOnly: true
          description: |
            Details of the return request, if one has been filed.
            Only present when status is `return_requested` or `returned`.
          allOf:
            - $ref: "#/components/schemas/WireReturnRequest"
        rejection_reason:
          type: string
          readOnly: true
          description: |
            Explanation of why the control engine rejected this wire.
            Only present when status is `rejected`.
        control_results:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/ControlResult"
          description: Results of control engine evaluations.
        blnk_transaction_id:
          type: string
          readOnly: true
          description: Corresponding transaction ID in Blnk Deploy.
          x-source: blnk
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # --- Create Wire Transfer ---
    CreateWireTransfer:
      type: object
      required:
        - account_id
        - amount
        - beneficiary
      properties:
        account_id:
          type: string
          description: |
            The ledger account to debit. Must be in `open` status with no blocking
            lock and sufficient available balance.
        account_number_id:
          type: string
          description: |
            Specific account number to use. If omitted, the account's primary
            (first created) account number is used.
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Transfer amount in cents.
        beneficiary:
          $ref: "#/components/schemas/WireBeneficiary"
        purpose:
          type: string
          maxLength: 140
          description: Originator-to-beneficiary information included in the Fedwire message.
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    # --- Wire Return Request ---
    WireReturnRequest:
      type: object
      description: |
        A request to return a completed wire. Wire returns are not guaranteed —
        the receiving bank may deny the request. The return_request object tracks
        the lifecycle of the request itself.
      properties:
        reason:
          $ref: "#/components/schemas/WireReturnRequestReason"
        detail:
          type: string
          maxLength: 500
          description: Free-text explanation supporting the return request.
        status:
          type: string
          enum: [pending, accepted, denied]
          readOnly: true
          description: |
            Status of the return request.
            - `pending` — Request submitted to receiving bank, awaiting response.
            - `accepted` — Receiving bank honored the return; funds being returned.
            - `denied` — Receiving bank denied the return request.
        requested_at:
          type: string
          format: date-time
          readOnly: true
        resolved_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the return request was accepted or denied.

    # --- Create Wire Return Request ---
    CreateWireReturnRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          $ref: "#/components/schemas/WireReturnRequestReason"
        detail:
          type: string
          maxLength: 500
          description: Supporting explanation for the return request.

    # --- Wire Transfer List ---
    WireTransferList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WireTransfer"
        pagination:
          $ref: "#/components/schemas/Pagination"

# ============================================================================
# Paths — Entity
# ============================================================================
paths:

  # --------------------------------------------------------------------------
  # Unified entity namespace — list & get
  # --------------------------------------------------------------------------
  /entities:
    get:
      operationId: listEntities
      summary: List entities
      description: |
        Returns a paginated list of entities. Supports filtering by type, status, and lock type.
        Results are ordered by `created_at` descending (newest first).
      tags: [Entities]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/EntityType"
          description: Filter by entity type.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/EntityStatus"
          description: Filter by entity status.
        - name: lock_type
          in: query
          schema:
            $ref: "#/components/schemas/LockType"
          description: Filter by lock type.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
          description: Only return entities created after this timestamp.
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
          description: Only return entities created before this timestamp.
      responses:
        "200":
          description: Paginated list of entities.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /entities/{entity_id}:
    get:
      operationId: getEntity
      summary: Retrieve an entity
      description: |
        Returns a single entity by ID. The response schema varies by `type` —
        use the discriminator to determine which type-specific fields are present.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The entity.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # --------------------------------------------------------------------------
  # Type-specific creation endpoints
  # --------------------------------------------------------------------------
  /entities/person:
    post:
      operationId: createPerson
      summary: Create a person entity
      description: |
        Creates a new person entity in `pending` status. The entity must pass KYC
        verification before it can be activated.

        **Control gates:** CD-01 (CIP Data Collection), BA-05 (OFAC Screening).
        OFAC screening runs automatically on creation — if a match is found, the entity
        is created with `lock_type: compliance` and a compliance officer review is required.
      tags: [Entities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePerson"
      responses:
        "201":
          description: Person entity created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /entities/business:
    post:
      operationId: createBusiness
      summary: Create a business entity
      description: |
        Creates a new business entity in `pending` status. All beneficial owners
        (persons with ≥25% ownership) must already exist as person entities.

        **Control gates:** CD-02 (Business CIP), CD-10 (Beneficial Ownership), BA-05 (OFAC Screening).
        OFAC screening runs against the business name, EIN, and all beneficial owners.
      tags: [Entities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusiness"
      responses:
        "201":
          description: Business entity created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /entities/trust:
    post:
      operationId: createTrust
      summary: Create a trust entity
      description: |
        Creates a new trust entity in `pending` status. All associated persons
        (trustees, grantors, beneficiaries) must already exist as person entities.

        **Control gates:** CD-03 (Trust CIP), BA-05 (OFAC Screening).
      tags: [Entities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrust"
      responses:
        "201":
          description: Trust entity created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trust"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /entities/joint:
    post:
      operationId: createJoint
      summary: Create a joint entity
      description: |
        Creates a new joint entity in `pending` status. All member persons must
        already exist as person entities. The joint entity becomes `active` only
        after all members have `kyc_status: approved`.

        **Control gates:** BA-05 (OFAC Screening on all members).
      tags: [Entities]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJoint"
      responses:
        "201":
          description: Joint entity created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Joint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # --------------------------------------------------------------------------
  # Type-specific update endpoints (PATCH)
  # --------------------------------------------------------------------------
  /entities/person/{entity_id}:
    patch:
      operationId: updatePerson
      summary: Update a person entity
      description: |
        Partially updates a person entity. Only provided fields are modified.
        Write-once fields (`ssn`, `date_of_birth`) cannot be changed after creation.
        Status transitions use `POST /entities/{entity_id}/status`.

        **Control gates:** CD-06 (CDD Refresh) may trigger re-verification if
        address or name changes are detected.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePerson"
      responses:
        "200":
          description: Person entity updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /entities/business/{entity_id}:
    patch:
      operationId: updateBusiness
      summary: Update a business entity
      description: |
        Partially updates a business entity. Write-once fields (`ein`) cannot be changed.

        **Control gates:** CD-10 (Beneficial Ownership) re-evaluated if `beneficial_owners` changes.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusiness"
      responses:
        "200":
          description: Business entity updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /entities/trust/{entity_id}:
    patch:
      operationId: updateTrust
      summary: Update a trust entity
      description: |
        Partially updates a trust entity. Write-once fields (`ein`) cannot be changed.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrust"
      responses:
        "200":
          description: Trust entity updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trust"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /entities/joint/{entity_id}:
    patch:
      operationId: updateJoint
      summary: Update a joint entity
      description: |
        Updates the members of a joint entity. Minimum 2 members enforced.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJoint"
      responses:
        "200":
          description: Joint entity updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Joint"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # --------------------------------------------------------------------------
  # Entity actions — status transitions and locks
  # --------------------------------------------------------------------------
  /entities/{entity_id}/status:
    post:
      operationId: transitionEntityStatus
      summary: Transition entity status
      description: |
        Transitions an entity's lifecycle status. Valid transitions:
        - `pending` → `active` (requires `kyc_status: approved`)
        - `active` → `disabled` (requires `reason`)
        - `disabled` → `active`
        - `disabled` → `archived` (terminal, requires `reason`)

        Events emitted: `entity.activated`, `entity.disabled`, `entity.archived`.

        **Control gates:** Activation blocked if BA-05 (OFAC) has a pending match.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transition not allowed from the current state, or a compliance control
            is blocking the transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: invalid_status_transition
                title: Invalid Status Transition
                detail: "Cannot activate entity ent_abc123: kyc_status is 'pending', must be 'approved'."
                doc_url: "https://api.cassandra.bank/docs/errors/invalid-status-transition"
                request_id: req_abc123def456
                resource_id: ent_abc123
                resource_type: entity

  /entities/{entity_id}/lock:
    put:
      operationId: updateEntityLock
      summary: Update entity lock
      description: |
        Sets or removes the orthogonal lock on an entity. Locks restrict operations
        independently of entity status — an entity can be `active` but locked.

        Lock types:
        - `none` — No lock (removes any existing lock).
        - `compliance` — Set by control engine (e.g., OFAC match). Cannot be removed via API — requires compliance officer action.
        - `fraud` — Fraud investigation hold.
        - `legal` — Legal/subpoena hold.
        - `admin` — Administrative hold.

        Events emitted: `entity.locked`, `entity.unlocked`.

        **Note:** `compliance` locks set by the control engine (e.g., BA-05 OFAC match)
        cannot be removed via this endpoint. They require resolution through the
        compliance review workflow.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLockUpdate"
      responses:
        "200":
          description: Lock updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot modify a compliance lock set by the control engine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — Account
  # ==========================================================================

  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts
      description: |
        Returns a paginated list of accounts. Supports filtering by entity, type,
        status, and lock type. Results ordered by `created_at` descending.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: entity_id
          in: query
          schema:
            type: string
          description: Filter by primary owning entity.
        - name: account_type
          in: query
          schema:
            $ref: "#/components/schemas/AccountType"
          description: Filter by account type.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccountStatus"
          description: Filter by account status.
        - name: lock_type
          in: query
          schema:
            $ref: "#/components/schemas/LockType"
          description: Filter by lock type.
        - name: dormancy_status
          in: query
          schema:
            $ref: "#/components/schemas/DormancyStatus"
          description: Filter by dormancy status.
      responses:
        "200":
          description: Paginated list of accounts.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAccount
      summary: Create an account
      description: |
        Creates a new ledger account in `open` status. The primary owning entity
        must be in `active` status with `kyc_status: approved`.

        A corresponding ledger is created in Blnk Deploy. The first account number
        is allocated automatically by the aggregator and associated with this account.

        **Control gates:** CD-04 (Account Opening CDD), BA-05 (OFAC check on all owners).

        **Events emitted:** `account.created`, `account_number.created`.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccount"
      responses:
        "201":
          description: Account created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Retrieve an account
      description: |
        Returns a single account by ID, including current balances from the
        Blnk Deploy ledger and bookkeeping layer fields.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The account.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateAccount
      summary: Update an account
      description: |
        Partially updates an account. Immutable fields (`entity_id`, `account_type`,
        `currency`) cannot be changed. Balance fields are read-only — use transaction
        endpoints to move money. Status and lock transitions use dedicated action endpoints.

        Owners list is replaced in full — provide the complete desired list.
        All referenced entities must exist and be in `active` status.

        **Control gates:** CD-10 (Beneficial Ownership) re-evaluated if owners change.

        **Events emitted:** `account.updated`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccount"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /accounts/{account_id}/status:
    post:
      operationId: transitionAccountStatus
      summary: Transition account status
      description: |
        Transitions an account's lifecycle status. Valid transitions:
        - `open` to `frozen` (freeze)
        - `frozen` to `open` (unfreeze)
        - `open` or `frozen` to `closed` (close — balance must be zero)

        Freezing an account blocks all debits. Credits may still post (e.g., incoming
        ACH, refunds) to avoid payment failures for the counterparty. To block all
        activity, combine freeze with a lock.

        Closing is terminal and irreversible. All associated account numbers are
        automatically canceled. The account number(s) are permanently retired (never reused).

        **Control gates:** Account closure blocked if `locked_amount > 0` (compliance hold active).

        **Events emitted:** `account.frozen`, `account.unfrozen`, `account.closed`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transition not allowed from the current state, or balance is non-zero
            for a close action, or a compliance hold is active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: invalid_status_transition
                title: Invalid Status Transition
                detail: "Cannot close account acct_3rTv8m: balance is $150.00, must be $0.00."
                doc_url: "https://api.cassandra.bank/docs/errors/invalid-status-transition"
                request_id: req_xyz789
                resource_id: acct_3rTv8mKqWsN5xLpJ7bYz
                resource_type: account

  /accounts/{account_id}/lock:
    put:
      operationId: updateAccountLock
      summary: Update account lock
      description: |
        Sets or removes the orthogonal lock on an account. Same semantics as
        entity locks — `compliance` locks set by the control engine cannot be
        removed via this endpoint.

        A locked account restricts operations independently of status. An account
        can be `open` but locked — preventing transfers while allowing balance queries.

        **Events emitted:** `account.locked`, `account.unlocked`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLockUpdate"
      responses:
        "200":
          description: Lock updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot modify a compliance lock set by the control engine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — Account Number
  # ==========================================================================

  /accounts/{account_id}/account-numbers:
    get:
      operationId: listAccountNumbers
      summary: List account numbers for an account
      description: |
        Returns all account numbers associated with a ledger account.
        An account always has at least one account number (created automatically
        on account creation).
      tags: [Account Numbers]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccountNumberStatus"
          description: Filter by account number status.
      responses:
        "200":
          description: Paginated list of account numbers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumberList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAccountNumber
      summary: Create an additional account number
      description: |
        Allocates a new 12-digit account number for an existing account. The number
        is assigned by the aggregator using the fintech's 3-digit prefix and the
        next available sequence. A Luhn check digit is appended.

        Use this for BaaS scenarios where a single ledger account needs multiple
        routable account numbers (e.g., per end-user in an FBO structure).

        The account must be in `open` status. The `informational_entity_id` must
        reference an existing entity in `active` status — this is the entity used
        for FBO attribution and BSA monitoring at the account number level.

        **Control gates:** BA-05 (OFAC screening on the informational entity).

        **Events emitted:** `account_number.created`.
      tags: [Account Numbers]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountNumber"
      responses:
        "201":
          description: Account number created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /account-numbers/{account_number_id}:
    get:
      operationId: getAccountNumber
      summary: Retrieve an account number
      description: |
        Returns a single account number by its resource ID. This is a convenience
        endpoint — account numbers are also accessible via
        `GET /accounts/{account_id}/account-numbers`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The account number.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateAccountNumber
      summary: Update an account number
      description: |
        Partially updates an account number. Only `label`, `informational_entity_id`,
        and `metadata` can be modified. The account number itself, routing number,
        and account association are immutable.

        **Events emitted:** `account_number.updated`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountNumber"
      responses:
        "200":
          description: Account number updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /account-numbers/{account_number_id}/status:
    post:
      operationId: transitionAccountNumberStatus
      summary: Transition account number status
      description: |
        Transitions an account number's lifecycle status. Valid transitions:
        - `active` to `disabled` (disable — inbound payments rejected at aggregator routing)
        - `disabled` to `active` (enable)
        - `active` or `disabled` to `canceled` (cancel — terminal, number permanently retired)

        Disabling an account number causes the aggregator's inbound routing to
        reject payments to this number with an ACH return code R04 (Invalid Account Number).
        The underlying ledger account is unaffected — other account numbers on the
        same account continue to function.

        Canceling is irreversible. Per Decision 20, account numbers are never reused.

        **Events emitted:** `account_number.disabled`, `account_number.enabled`, `account_number.canceled`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountNumberStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Transition not allowed from the current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — ACH Transfer
  # ==========================================================================

  /transfers/ach:
    get:
      operationId: listAchTransfers
      summary: List ACH transfers
      description: |
        Returns a paginated list of ACH transfers. Supports filtering by account,
        status, direction, and date range. Results ordered by `created_at` descending.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by ledger account.
        - name: account_number_id
          in: query
          schema:
            type: string
          description: Filter by specific account number.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AchTransferStatus"
          description: Filter by transfer status.
        - name: direction
          in: query
          schema:
            $ref: "#/components/schemas/AchDirection"
          description: Filter by direction (credit or debit).
        - name: window
          in: query
          schema:
            $ref: "#/components/schemas/AchWindow"
          description: Filter by processing window.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
          description: Only return transfers created after this timestamp.
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
          description: Only return transfers created before this timestamp.
      responses:
        "200":
          description: Paginated list of ACH transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAchTransfer
      summary: Create an ACH transfer
      description: |
        Originates a single ACH transfer. The transfer enters `pending_approval`
        status while the control engine evaluates it. If all controls pass, it
        advances to `submitted` and an ACH file is queued for the next Fed window.
        If any control fails, the transfer is `rejected` immediately.

        The response includes `control_results` showing which controls ran and
        their verdicts, `effective_date`, and `expected_settlement`.

        For on-us transfers (both accounts within this instance), use
        `POST /transfers/book` instead — it settles instantly without going
        through the ACH network.

        **Control gates:** BA-05 (OFAC on counterparty name), BA-07 (CTR threshold),
        BA-08 (structuring detection), VL-01 (daily ACH velocity).

        **Events emitted:** `ach_transfer.created`, then `ach_transfer.submitted`
        or `ach_transfer.rejected` based on control engine verdict.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchTransfer"
      responses:
        "201":
          description: |
            ACH transfer created. Status will be `pending_approval` (controls still
            evaluating), `submitted` (controls passed), or `rejected` (controls failed).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — the account is frozen, locked, closed, or has
            insufficient available balance (for credit direction).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 422
                type: insufficient_funds
                title: Insufficient Funds
                detail: "Account acct_3rTv8m has available balance of $50.00; transfer requires $100.00."
                doc_url: "https://api.cassandra.bank/docs/errors/insufficient-funds"
                request_id: req_xyz789
                resource_id: acct_3rTv8mKqWsN5xLpJ7bYz
                resource_type: account
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/ach/{ach_transfer_id}:
    get:
      operationId: getAchTransfer
      summary: Retrieve an ACH transfer
      description: |
        Returns a single ACH transfer by ID, including current status, settlement
        timing, control results, and return information (if applicable).
      tags: [ACH Transfers]
      parameters:
        - name: ach_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The ACH transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /transfers/ach/{ach_transfer_id}/cancel:
    post:
      operationId: cancelAchTransfer
      summary: Cancel an ACH transfer
      description: |
        Cancels a submitted ACH transfer before it settles. Only transfers in
        `submitted` status can be canceled — once a transfer has settled, you
        must initiate a return through the receiving bank.

        Cancellation is best-effort: if the ACH file has already been transmitted
        to the Fed, cancellation may fail. In that case, the transfer remains
        `submitted` and settles normally.

        **Events emitted:** `ach_transfer.canceled` (if successful).
      tags: [ACH Transfers]
      parameters:
        - name: ach_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Reason for cancellation. Recorded in audit log.
      responses:
        "200":
          description: Transfer canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transfer cannot be canceled — either it is not in `submitted` status,
            or the ACH file has already been transmitted to the Fed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: transfer_not_cancelable
                title: Transfer Not Cancelable
                detail: "ACH transfer ach_5kRb3m is in status 'settled' and cannot be canceled."
                doc_url: "https://api.cassandra.bank/docs/errors/transfer-not-cancelable"
                request_id: req_xyz789
                resource_id: ach_5kRb3mNqWsT8xLpJ2vYz
                resource_type: ach_transfer

  /transfers/ach/batch:
    post:
      operationId: createAchBatch
      summary: Create a batch of ACH transfers
      description: |
        Submits up to 5,000 ACH transfers in a single request. Each transfer is
        validated and evaluated by the control engine independently — individual
        items may be rejected while others succeed.

        All transfers in the batch share the same processing window. If `window`
        is specified at the batch level, it applies to all items (items cannot
        override it individually).

        The response returns per-item results with the partner-provided `reference`
        for correlation.

        **Rate limit tier:** Bulk (10/min).

        **Control gates:** Same as individual ACH creation — each item is evaluated independently.

        **Events emitted:** One `ach_transfer.created` per accepted item, followed by
        `ach_transfer.submitted` or `ach_transfer.rejected` per item.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchBatch"
      responses:
        "200":
          description: |
            Batch processed. Check individual `results[].succeeded` to determine
            which transfers were accepted. HTTP 200 even if some items failed —
            the batch itself was processed successfully.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ==========================================================================
  # Paths — Book Transfer
  # ==========================================================================

  /transfers/book:
    get:
      operationId: listBookTransfers
      summary: List book transfers
      description: |
        Returns a paginated list of book transfers. Supports filtering by account
        (source or destination), status, and date range.
      tags: [Book Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by account (matches either source or destination).
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BookTransferStatus"
          description: Filter by transfer status.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of book transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createBookTransfer
      summary: Create a book transfer
      description: |
        Creates an instant on-us transfer between two accounts in the same fintech
        instance. Both sides settle immediately via Blnk's double-entry ledger —
        no ACH network or Fed involvement.

        The transfer enters `pending` status momentarily while the control engine
        evaluates it, then resolves to `completed` or `rejected` synchronously in
        the same request. The response always reflects the final state.

        Both accounts must be in the same fintech instance. For transfers to
        accounts in other instances or external banks, use
        `POST /transfers/ach` or `POST /transfers/wire`.

        **Control gates:** BA-05 (OFAC), BA-07 (CTR threshold), BA-08 (structuring),
        VL-01 (daily velocity). Same controls as ACH — book transfers are not a
        compliance bypass. The same event model is used for BSA monitoring.

        **Events emitted:** `book_transfer.completed` or `book_transfer.rejected`.
      tags: [Book Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookTransfer"
      responses:
        "201":
          description: |
            Book transfer created. Status will be `completed` (controls passed,
            funds moved) or `rejected` (controls failed, no funds moved).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — source account is frozen/locked/closed, destination
            account is closed, insufficient available balance, or accounts are
            not in the same instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/book/{book_transfer_id}:
    get:
      operationId: getBookTransfer
      summary: Retrieve a book transfer
      description: Returns a single book transfer by ID.
      tags: [Book Transfers]
      parameters:
        - name: book_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The book transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Paths — Wire Transfer
  # ==========================================================================

  /transfers/wire:
    get:
      operationId: listWireTransfers
      summary: List wire transfers
      description: |
        Returns a paginated list of wire transfers. Supports filtering by account,
        status, direction, and date range. Results ordered by `created_at` descending.
      tags: [Wire Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by ledger account.
        - name: account_number_id
          in: query
          schema:
            type: string
          description: Filter by specific account number.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WireTransferStatus"
          description: Filter by transfer status.
        - name: direction
          in: query
          schema:
            $ref: "#/components/schemas/WireDirection"
          description: Filter by direction (outbound or inbound).
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of wire transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createWireTransfer
      summary: Create a wire transfer
      description: |
        Originates a domestic Fedwire transfer. The transfer enters `pending_approval`
        status while the control engine evaluates it. If all controls pass, it
        advances to `submitted` and a Fedwire message is sent. If any control fails,
        the transfer is `rejected` immediately.

        Wires are domestic only (no SWIFT/international). For international
        payments, partners must use their own correspondent banking relationships.

        The response includes `control_results` and, once submitted, the `imad`
        (Input Message Accountability Data) for Fed tracing.

        **Control gates:** BA-05 (OFAC on beneficiary name and bank), BA-07 (CTR threshold),
        BA-08 (structuring detection), VL-02 (wire velocity limits).

        **Events emitted:** `wire_transfer.created`, then `wire_transfer.submitted`
        or `wire_transfer.rejected`.
      tags: [Wire Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWireTransfer"
      responses:
        "201":
          description: |
            Wire transfer created. Status will be `pending_approval`, `submitted`,
            or `rejected` depending on control engine evaluation.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — account is frozen, locked, closed, or has
            insufficient available balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/wire/{wire_transfer_id}:
    get:
      operationId: getWireTransfer
      summary: Retrieve a wire transfer
      description: |
        Returns a single wire transfer by ID, including current status, IMAD/OMAD
        (if submitted), control results, and return request details (if applicable).
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The wire transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /transfers/wire/{wire_transfer_id}/cancel:
    post:
      operationId: cancelWireTransfer
      summary: Cancel a wire transfer
      description: |
        Cancels a submitted wire transfer before it completes. Only transfers in
        `submitted` status can be canceled.

        Wire cancellation is time-sensitive — Fedwire messages are processed in
        near-real-time. If the message has already been acknowledged by the receiving
        Fed bank, cancellation will fail and the wire will complete normally.

        For completed wires, use the return request endpoint instead.

        **Events emitted:** `wire_transfer.canceled` (if successful).
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Reason for cancellation. Recorded in audit log.
      responses:
        "200":
          description: Wire transfer canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Wire cannot be canceled — either it is not in `submitted` status
            or the Fedwire message has already been acknowledged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: transfer_not_cancelable
                title: Transfer Not Cancelable
                detail: "Wire transfer wire_4nRb7m is in status 'completed' and cannot be canceled. Use the return request endpoint instead."
                doc_url: "https://api.cassandra.bank/docs/errors/transfer-not-cancelable"
                request_id: req_xyz789
                resource_id: wire_4nRb7mKqWsT3xLpJ9vYz
                resource_type: wire_transfer

  /transfers/wire/{wire_transfer_id}/return-request:
    post:
      operationId: createWireReturnRequest
      summary: Request a wire return
      description: |
        Requests the return of a completed wire transfer. Only wires in `completed`
        status can have a return requested.

        **Wire returns are not guaranteed.** Unlike ACH returns (which are a right
        within the return window), wire returns are requests to the receiving bank.
        The receiving bank may deny the request, particularly if the beneficiary
        has already withdrawn the funds.

        Only four return reasons are supported per Decision 9:
        - `fraud` — Suspected fraudulent wire.
        - `duplicate` — Duplicate of a previous wire.
        - `incorrect_amount` — Wrong amount was sent.
        - `incorrect_beneficiary` — Wrong beneficiary received the funds.

        The wire status transitions to `return_requested`. The return request has
        its own lifecycle (pending, accepted, denied). If accepted, the wire moves
        to `returned`. If denied, the wire reverts to `completed`.

        **Events emitted:** `wire_transfer.return_requested`, then
        `wire_transfer.returned` or `wire_transfer.return_denied`.
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWireReturnRequest"
      responses:
        "200":
          description: |
            Return request submitted. The wire status is now `return_requested`.
            Monitor via webhooks or polling for the final outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Wire is not in `completed` status, or a return request has already
            been submitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: return_request_not_allowed
                title: Return Request Not Allowed
                detail: "Wire transfer wire_4nRb7m is in status 'submitted' and cannot have a return requested. Only completed wires support return requests."
                doc_url: "https://api.cassandra.bank/docs/errors/return-request-not-allowed"
                request_id: req_xyz789
                resource_id: wire_4nRb7mKqWsT3xLpJ9vYz
                resource_type: wire_transfer