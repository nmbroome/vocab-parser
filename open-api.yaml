          $ref: "#/components/responses/Conflict"

  # --------------------------------------------------------------------------
  # Entity actions — status transitions and locks
  # --------------------------------------------------------------------------
  /entities/{entity_id}/status:
    post:
      operationId: transitionEntityStatus
      summary: Transition entity status
      description: |
        Transitions an entity's lifecycle status. Valid transitions:
        - `pending` → `active` (requires `kyc_status: approved`)
        - `active` → `disabled` (requires `reason`)
        - `disabled` → `active`
        - `disabled` → `archived` (terminal, requires `reason`)

        Events emitted: `entity.activated`, `entity.disabled`, `entity.archived`.

        **Control gates:** Activation blocked if BA-05 (OFAC) has a pending match.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transition not allowed from the current state, or a compliance control
            is blocking the transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: invalid_status_transition
                title: Invalid Status Transition
                detail: "Cannot activate entity ent_abc123: kyc_status is 'pending', must be 'approved'."
                doc_url: "https://api.cassandra.bank/docs/errors/invalid-status-transition"
                request_id: req_abc123def456
                resource_id: ent_abc123
                resource_type: entity

  /entities/{entity_id}/lock:
    put:
      operationId: updateEntityLock
      summary: Update entity lock
      description: |
        Sets or removes the orthogonal lock on an entity. Locks restrict operations
        independently of entity status — an entity can be `active` but locked.

        Lock types:
        - `none` — No lock (removes any existing lock).
        - `compliance` — Set by control engine (e.g., OFAC match). Cannot be removed via API — requires compliance officer action.
        - `fraud` — Fraud investigation hold.
        - `legal` — Legal/subpoena hold.
        - `admin` — Administrative hold.

        Events emitted: `entity.locked`, `entity.unlocked`.

        **Note:** `compliance` locks set by the control engine (e.g., BA-05 OFAC match)
        cannot be removed via this endpoint. They require resolution through the
        compliance review workflow.
      tags: [Entities]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLockUpdate"
      responses:
        "200":
          description: Lock updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot modify a compliance lock set by the control engine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — Account
  # ==========================================================================

  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts
      description: |
        Returns a paginated list of accounts. Supports filtering by entity, type,
        status, and lock type. Results ordered by `created_at` descending.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: entity_id
          in: query
          schema:
            type: string
          description: Filter by primary owning entity.
        - name: account_type
          in: query
          schema:
            $ref: "#/components/schemas/AccountType"
          description: Filter by account type.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccountStatus"
          description: Filter by account status.
        - name: lock_type
          in: query
          schema:
            $ref: "#/components/schemas/LockType"
          description: Filter by lock type.
        - name: dormancy_status
          in: query
          schema:
            $ref: "#/components/schemas/DormancyStatus"
          description: Filter by dormancy status.
      responses:
        "200":
          description: Paginated list of accounts.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAccount
      summary: Create an account
      description: |
        Creates a new ledger account in `open` status. The primary owning entity
        must be in `active` status with `kyc_status: approved`.

        A corresponding ledger is created in Blnk Deploy. The first account number
        is allocated automatically by the aggregator and associated with this account.

        **Control gates:** CD-04 (Account Opening CDD), BA-05 (OFAC check on all owners).

        **Events emitted:** `account.created`, `account_number.created`.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccount"
      responses:
        "201":
          description: Account created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Retrieve an account
      description: |
        Returns a single account by ID, including current balances from the
        Blnk Deploy ledger and bookkeeping layer fields.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The account.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateAccount
      summary: Update an account
      description: |
        Partially updates an account. Immutable fields (`entity_id`, `account_type`,
        `currency`) cannot be changed. Balance fields are read-only — use transaction
        endpoints to move money. Status and lock transitions use dedicated action endpoints.

        Owners list is replaced in full — provide the complete desired list.
        All referenced entities must exist and be in `active` status.

        **Control gates:** CD-10 (Beneficial Ownership) re-evaluated if owners change.

        **Events emitted:** `account.updated`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccount"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /accounts/{account_id}/status:
    post:
      operationId: transitionAccountStatus
      summary: Transition account status
      description: |
        Transitions an account's lifecycle status. Valid transitions:
        - `open` to `frozen` (freeze)
        - `frozen` to `open` (unfreeze)
        - `open` or `frozen` to `closed` (close — balance must be zero)

        Freezing an account blocks all debits. Credits may still post (e.g., incoming
        ACH, refunds) to avoid payment failures for the counterparty. To block all
        activity, combine freeze with a lock.

        Closing is terminal and irreversible. All associated account numbers are
        automatically canceled. The account number(s) are permanently retired (never reused).

        **Control gates:** Account closure blocked if `locked_amount > 0` (compliance hold active).

        **Events emitted:** `account.frozen`, `account.unfrozen`, `account.closed`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transition not allowed from the current state, or balance is non-zero
            for a close action, or a compliance hold is active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: invalid_status_transition
                title: Invalid Status Transition
                detail: "Cannot close account acct_3rTv8m: balance is $150.00, must be $0.00."
                doc_url: "https://api.cassandra.bank/docs/errors/invalid-status-transition"
                request_id: req_xyz789
                resource_id: acct_3rTv8mKqWsN5xLpJ7bYz
                resource_type: account

  /accounts/{account_id}/lock:
    put:
      operationId: updateAccountLock
      summary: Update account lock
      description: |
        Sets or removes the orthogonal lock on an account. Same semantics as
        entity locks — `compliance` locks set by the control engine cannot be
        removed via this endpoint.

        A locked account restricts operations independently of status. An account
        can be `open` but locked — preventing transfers while allowing balance queries.

        **Events emitted:** `account.locked`, `account.unlocked`.
      tags: [Accounts]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLockUpdate"
      responses:
        "200":
          description: Lock updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot modify a compliance lock set by the control engine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — Account Number
  # ==========================================================================

  /accounts/{account_id}/account-numbers:
    get:
      operationId: listAccountNumbers
      summary: List account numbers for an account
      description: |
        Returns all account numbers associated with a ledger account.
        An account always has at least one account number (created automatically
        on account creation).
      tags: [Account Numbers]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccountNumberStatus"
          description: Filter by account number status.
      responses:
        "200":
          description: Paginated list of account numbers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumberList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAccountNumber
      summary: Create an additional account number
      description: |
        Allocates a new 12-digit account number for an existing account. The number
        is assigned by the aggregator using the fintech's 3-digit prefix and the
        next available sequence. A Luhn check digit is appended.

        Use this for BaaS scenarios where a single ledger account needs multiple
        routable account numbers (e.g., per end-user in an FBO structure).

        The account must be in `open` status. The `informational_entity_id` must
        reference an existing entity in `active` status — this is the entity used
        for FBO attribution and BSA monitoring at the account number level.

        **Control gates:** BA-05 (OFAC screening on the informational entity).

        **Events emitted:** `account_number.created`.
      tags: [Account Numbers]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountNumber"
      responses:
        "201":
          description: Account number created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /account-numbers/{account_number_id}:
    get:
      operationId: getAccountNumber
      summary: Retrieve an account number
      description: |
        Returns a single account number by its resource ID. This is a convenience
        endpoint — account numbers are also accessible via
        `GET /accounts/{account_id}/account-numbers`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The account number.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateAccountNumber
      summary: Update an account number
      description: |
        Partially updates an account number. Only `label`, `informational_entity_id`,
        and `metadata` can be modified. The account number itself, routing number,
        and account association are immutable.

        **Events emitted:** `account_number.updated`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountNumber"
      responses:
        "200":
          description: Account number updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /account-numbers/{account_number_id}/status:
    post:
      operationId: transitionAccountNumberStatus
      summary: Transition account number status
      description: |
        Transitions an account number's lifecycle status. Valid transitions:
        - `active` to `disabled` (disable — inbound payments rejected at aggregator routing)
        - `disabled` to `active` (enable)
        - `active` or `disabled` to `canceled` (cancel — terminal, number permanently retired)

        Disabling an account number causes the aggregator's inbound routing to
        reject payments to this number with an ACH return code R04 (Invalid Account Number).
        The underlying ledger account is unaffected — other account numbers on the
        same account continue to function.

        Canceling is irreversible. Per Decision 20, account numbers are never reused.

        **Events emitted:** `account_number.disabled`, `account_number.enabled`, `account_number.canceled`.
      tags: [Account Numbers]
      parameters:
        - name: account_number_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountNumberStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountNumber"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Transition not allowed from the current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — ACH Transfer
  # ==========================================================================

  /transfers/ach:
    get:
      operationId: listAchTransfers
      summary: List ACH transfers
      description: |
        Returns a paginated list of ACH transfers. Supports filtering by account,
        status, direction, and date range. Results ordered by `created_at` descending.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by ledger account.
        - name: account_number_id
          in: query
          schema:
            type: string
          description: Filter by specific account number.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AchTransferStatus"
          description: Filter by transfer status.
        - name: direction
          in: query
          schema:
            $ref: "#/components/schemas/AchDirection"
          description: Filter by direction (credit or debit).
        - name: window
          in: query
          schema:
            $ref: "#/components/schemas/AchWindow"
          description: Filter by processing window.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
          description: Only return transfers created after this timestamp.
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
          description: Only return transfers created before this timestamp.
      responses:
        "200":
          description: Paginated list of ACH transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createAchTransfer
      summary: Create an ACH transfer
      description: |
        Originates a single ACH transfer. The transfer enters `pending_approval`
        status while the control engine evaluates it. If all controls pass, it
        advances to `submitted` and an ACH file is queued for the next Fed window.
        If any control fails, the transfer is `rejected` immediately.

        The response includes `control_results` showing which controls ran and
        their verdicts, `effective_date`, and `expected_settlement`.

        For on-us transfers (both accounts within this instance), use
        `POST /transfers/book` instead — it settles instantly without going
        through the ACH network.

        **Control gates:** BA-05 (OFAC on counterparty name), BA-07 (CTR threshold),
        BA-08 (structuring detection), VL-01 (daily ACH velocity).

        **Events emitted:** `ach_transfer.created`, then `ach_transfer.submitted`
        or `ach_transfer.rejected` based on control engine verdict.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchTransfer"
      responses:
        "201":
          description: |
            ACH transfer created. Status will be `pending_approval` (controls still
            evaluating), `submitted` (controls passed), or `rejected` (controls failed).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — the account is frozen, locked, closed, or has
            insufficient available balance (for credit direction).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 422
                type: insufficient_funds
                title: Insufficient Funds
                detail: "Account acct_3rTv8m has available balance of $50.00; transfer requires $100.00."
                doc_url: "https://api.cassandra.bank/docs/errors/insufficient-funds"
                request_id: req_xyz789
                resource_id: acct_3rTv8mKqWsN5xLpJ7bYz
                resource_type: account
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/ach/{ach_transfer_id}:
    get:
      operationId: getAchTransfer
      summary: Retrieve an ACH transfer
      description: |
        Returns a single ACH transfer by ID, including current status, settlement
        timing, control results, and return information (if applicable).
      tags: [ACH Transfers]
      parameters:
        - name: ach_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The ACH transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /transfers/ach/{ach_transfer_id}/cancel:
    post:
      operationId: cancelAchTransfer
      summary: Cancel an ACH transfer
      description: |
        Cancels a submitted ACH transfer before it settles. Only transfers in
        `submitted` status can be canceled — once a transfer has settled, you
        must initiate a return through the receiving bank.

        Cancellation is best-effort: if the ACH file has already been transmitted
        to the Fed, cancellation may fail. In that case, the transfer remains
        `submitted` and settles normally.

        **Events emitted:** `ach_transfer.canceled` (if successful).
      tags: [ACH Transfers]
      parameters:
        - name: ach_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Reason for cancellation. Recorded in audit log.
      responses:
        "200":
          description: Transfer canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transfer cannot be canceled — either it is not in `submitted` status,
            or the ACH file has already been transmitted to the Fed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: transfer_not_cancelable
                title: Transfer Not Cancelable
                detail: "ACH transfer ach_5kRb3m is in status 'settled' and cannot be canceled."
                doc_url: "https://api.cassandra.bank/docs/errors/transfer-not-cancelable"
                request_id: req_xyz789
                resource_id: ach_5kRb3mNqWsT8xLpJ2vYz
                resource_type: ach_transfer

  /transfers/ach/batch:
    post:
      operationId: createAchBatch
      summary: Create a batch of ACH transfers
      description: |
        Submits up to 5,000 ACH transfers in a single request. Each transfer is
        validated and evaluated by the control engine independently — individual
        items may be rejected while others succeed.

        All transfers in the batch share the same processing window. If `window`
        is specified at the batch level, it applies to all items (items cannot
        override it individually).

        The response returns per-item results with the partner-provided `reference`
        for correlation.

        **Rate limit tier:** Bulk (10/min).

        **Control gates:** Same as individual ACH creation — each item is evaluated independently.

        **Events emitted:** One `ach_transfer.created` per accepted item, followed by
        `ach_transfer.submitted` or `ach_transfer.rejected` per item.
      tags: [ACH Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchBatch"
      responses:
        "200":
          description: |
            Batch processed. Check individual `results[].succeeded` to determine
            which transfers were accepted. HTTP 200 even if some items failed —
            the batch itself was processed successfully.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ==========================================================================
  # Paths — Book Transfer
  # ==========================================================================

  /transfers/book:
    get:
      operationId: listBookTransfers
      summary: List book transfers
      description: |
        Returns a paginated list of book transfers. Supports filtering by account
        (source or destination), status, and date range.
      tags: [Book Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by account (matches either source or destination).
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BookTransferStatus"
          description: Filter by transfer status.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of book transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createBookTransfer
      summary: Create a book transfer
      description: |
        Creates an instant on-us transfer between two accounts in the same fintech
        instance. Both sides settle immediately via Blnk's double-entry ledger —
        no ACH network or Fed involvement.

        The transfer enters `pending` status momentarily while the control engine
        evaluates it, then resolves to `completed` or `rejected` synchronously in
        the same request. The response always reflects the final state.

        Both accounts must be in the same fintech instance. For transfers to
        accounts in other instances or external banks, use
        `POST /transfers/ach` or `POST /transfers/wire`.

        **Control gates:** BA-05 (OFAC), BA-07 (CTR threshold), BA-08 (structuring),
        VL-01 (daily velocity). Same controls as ACH — book transfers are not a
        compliance bypass. The same event model is used for BSA monitoring.

        **Events emitted:** `book_transfer.completed` or `book_transfer.rejected`.
      tags: [Book Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookTransfer"
      responses:
        "201":
          description: |
            Book transfer created. Status will be `completed` (controls passed,
            funds moved) or `rejected` (controls failed, no funds moved).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — source account is frozen/locked/closed, destination
            account is closed, insufficient available balance, or accounts are
            not in the same instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/book/{book_transfer_id}:
    get:
      operationId: getBookTransfer
      summary: Retrieve a book transfer
      description: Returns a single book transfer by ID.
      tags: [Book Transfers]
      parameters:
        - name: book_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The book transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Paths — Wire Transfer
  # ==========================================================================

  /transfers/wire:
    get:
      operationId: listWireTransfers
      summary: List wire transfers
      description: |
        Returns a paginated list of wire transfers. Supports filtering by account,
        status, direction, and date range. Results ordered by `created_at` descending.
      tags: [Wire Transfers]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by ledger account.
        - name: account_number_id
          in: query
          schema:
            type: string
          description: Filter by specific account number.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WireTransferStatus"
          description: Filter by transfer status.
        - name: direction
          in: query
          schema:
            $ref: "#/components/schemas/WireDirection"
          description: Filter by direction (outbound or inbound).
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of wire transfers.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransferList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createWireTransfer
      summary: Create a wire transfer
      description: |
        Originates a domestic Fedwire transfer. The transfer enters `pending_approval`
        status while the control engine evaluates it. If all controls pass, it
        advances to `submitted` and a Fedwire message is sent. If any control fails,
        the transfer is `rejected` immediately.

        Wires are domestic only (no SWIFT/international). For international
        payments, partners must use their own correspondent banking relationships.

        The response includes `control_results` and, once submitted, the `imad`
        (Input Message Accountability Data) for Fed tracing.

        **Control gates:** BA-05 (OFAC on beneficiary name and bank), BA-07 (CTR threshold),
        BA-08 (structuring detection), VL-02 (wire velocity limits).

        **Events emitted:** `wire_transfer.created`, then `wire_transfer.submitted`
        or `wire_transfer.rejected`.
      tags: [Wire Transfers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWireTransfer"
      responses:
        "201":
          description: |
            Wire transfer created. Status will be `pending_approval`, `submitted`,
            or `rejected` depending on control engine evaluation.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Unprocessable — account is frozen, locked, closed, or has
            insufficient available balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /transfers/wire/{wire_transfer_id}:
    get:
      operationId: getWireTransfer
      summary: Retrieve a wire transfer
      description: |
        Returns a single wire transfer by ID, including current status, IMAD/OMAD
        (if submitted), control results, and return request details (if applicable).
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The wire transfer.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /transfers/wire/{wire_transfer_id}/cancel:
    post:
      operationId: cancelWireTransfer
      summary: Cancel a wire transfer
      description: |
        Cancels a submitted wire transfer before it completes. Only transfers in
        `submitted` status can be canceled.

        Wire cancellation is time-sensitive — Fedwire messages are processed in
        near-real-time. If the message has already been acknowledged by the receiving
        Fed bank, cancellation will fail and the wire will complete normally.

        For completed wires, use the return request endpoint instead.

        **Events emitted:** `wire_transfer.canceled` (if successful).
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Reason for cancellation. Recorded in audit log.
      responses:
        "200":
          description: Wire transfer canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Wire cannot be canceled — either it is not in `submitted` status
            or the Fedwire message has already been acknowledged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: transfer_not_cancelable
                title: Transfer Not Cancelable
                detail: "Wire transfer wire_4nRb7m is in status 'completed' and cannot be canceled. Use the return request endpoint instead."
                doc_url: "https://api.cassandra.bank/docs/errors/transfer-not-cancelable"
                request_id: req_xyz789
                resource_id: wire_4nRb7mKqWsT3xLpJ9vYz
                resource_type: wire_transfer

  /transfers/wire/{wire_transfer_id}/return-request:
    post:
      operationId: createWireReturnRequest
      summary: Request a wire return
      description: |
        Requests the return of a completed wire transfer. Only wires in `completed`
        status can have a return requested.

        **Wire returns are not guaranteed.** Unlike ACH returns (which are a right
        within the return window), wire returns are requests to the receiving bank.
        The receiving bank may deny the request, particularly if the beneficiary
        has already withdrawn the funds.

        Only four return reasons are supported per Decision 9:
        - `fraud` — Suspected fraudulent wire.
        - `duplicate` — Duplicate of a previous wire.
        - `incorrect_amount` — Wrong amount was sent.
        - `incorrect_beneficiary` — Wrong beneficiary received the funds.

        The wire status transitions to `return_requested`. The return request has
        its own lifecycle (pending, accepted, denied). If accepted, the wire moves
        to `returned`. If denied, the wire reverts to `completed`.

        **Events emitted:** `wire_transfer.return_requested`, then
        `wire_transfer.returned` or `wire_transfer.return_denied`.
      tags: [Wire Transfers]
      parameters:
        - name: wire_transfer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWireReturnRequest"
      responses:
        "200":
          description: |
            Return request submitted. The wire status is now `return_requested`.
            Monitor via webhooks or polling for the final outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireTransfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Wire is not in `completed` status, or a return request has already
            been submitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: return_request_not_allowed
                title: Return Request Not Allowed
                detail: "Wire transfer wire_4nRb7m is in status 'submitted' and cannot have a return requested. Only completed wires support return requests."
                doc_url: "https://api.cassandra.bank/docs/errors/return-request-not-allowed"
                request_id: req_xyz789
                resource_id: wire_4nRb7mKqWsT3xLpJ9vYz
                resource_type: wire_transfer

  # ==========================================================================
  # Paths — KYC/KYB Verification
  # ==========================================================================

  /entities/{entity_id}/verifications:
    get:
      operationId: listVerifications
      summary: List verifications for an entity
      description: |
        Returns all verification attempts for an entity, ordered by `created_at`
        descending (most recent first). An entity may have multiple verifications
        over its lifetime due to CDD refresh cycles, information changes, or
        re-verification after denial.

        The most recent `approved` verification (if any) is the one that determines
        the entity's current `kyc_status`.
      tags: [KYC Verifications]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VerificationStatus"
          description: Filter by verification status.
        - name: provider
          in: query
          schema:
            $ref: "#/components/schemas/VerificationProvider"
          description: Filter by provider.
      responses:
        "200":
          description: Paginated list of verifications.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: initiateVerification
      summary: Initiate a verification
      description: |
        Initiates a KYC (person) or KYB (business/trust) verification using the
        instance's configured provider. The entity's PII is sent to the provider
        automatically — the partner does not need to provide identity data in
        this request.

        The verification type is inferred from the entity type:
        - `person` → KYC
        - `business`, `trust` → KYB
        - `joint` → Not directly verifiable. Verify each member person individually.

        **OFAC screening (BA-05) runs in parallel** with the provider verification.
        Even if the provider approves the identity, an OFAC match will block the
        entity with `lock_type: compliance`.

        The entity's `kyc_status` is updated automatically based on the verification
        outcome:
        - Provider approved + OFAC clear → `kyc_status: approved`
        - Provider denied → `kyc_status: denied`
        - Provider pending / in review → `kyc_status: pending`

        **Control gates:** CD-01 (CIP Data Collection), BA-05 (OFAC Screening).

        **Events emitted:** `verification.initiated`, then `verification.approved`,
        `verification.denied`, or `verification.in_review` when the provider responds.
      tags: [KYC Verifications]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateVerification"
      responses:
        "201":
          description: |
            Verification initiated. Status will be `pending` while awaiting
            provider response. Monitor via webhooks or polling.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Entity already has a verification in `pending` or `in_review` status.
            Only one active verification is allowed at a time.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: 409
                type: verification_already_pending
                title: Verification Already Pending
                detail: "Entity ent_abc123 already has a pending verification ver_xyz789. Wait for it to resolve before initiating another."
                doc_url: "https://api.cassandra.bank/docs/errors/verification-already-pending"
                request_id: req_abc123
                resource_id: ent_abc123
                resource_type: entity
        "422":
          description: |
            Entity type is `joint` (verify members individually) or entity is
            already in `archived` status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /entities/{entity_id}/verifications/attest:
    post:
      operationId: submitPartnerAttestation
      summary: Submit a partner-provided KYC/KYB attestation
      description: |
        Submits a verification result from the partner's own KYC/KYB provider.
        Only available when the partner's instance is configured with
        `provider: partner_provided` in their KYC config.

        The partner's attestation is evaluated against their configured trust level:

        **trust_level: full**
        The partner's identity verification is accepted as-is. Cassandra still
        runs OFAC screening independently (compliance floor — cannot be disabled).
        If the partner attests `identity_verified: true` and OFAC is clear, the
        entity moves to `kyc_status: approved`.

        **trust_level: verify_watchlist_only**
        The partner's identity data is accepted, but Cassandra re-runs all
        watchlist and sanctions screening (OFAC/SDN, PEP lists, FinCEN 314a).
        The entity is only approved if both the partner's attestation AND
        Cassandra's watchlist checks pass.

        **OFAC always runs.** This is a compliance floor control (BA-05) and
        cannot be bypassed regardless of trust level or partner configuration.

        **Control gates:** BA-05 (OFAC), CD-01 (CIP completeness validation).

        **Events emitted:** `verification.attestation_submitted`, then
        `verification.approved` or `verification.denied`.
      tags: [KYC Verifications]
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPartnerAttestation"
      responses:
        "201":
          description: |
            Attestation submitted and OFAC screening initiated. If OFAC screening
            completes synchronously (typical), the response reflects the final
            status. If OFAC requires manual review (potential match), status will
            be `in_review`.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Partner is not configured for partner-provided KYC. Use the standard
            `POST /entities/{entity_id}/verifications` endpoint instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Entity already has a verification in `pending` or `in_review` status,
            or entity type is not compatible with attestation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /verifications/{verification_id}:
    get:
      operationId: getVerification
      summary: Retrieve a verification
      description: |
        Returns a single verification by ID. Includes provider result, OFAC
        screening result, and denial reasons (if applicable).

        The `provider_result.raw_response` field is only included when the
        requesting token has compliance-scoped permissions. Standard partner
        tokens receive the normalized result only.
      tags: [KYC Verifications]
      parameters:
        - name: verification_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The verification.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verification"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Paths — Card
  # ==========================================================================

  /cards:
    get:
      operationId: listCards
      summary: List cards
      description: |
        Returns a paginated list of cards. Supports filtering by account, entity,
        status, and card type.
      tags: [Cards]
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by ledger account.
        - name: entity_id
          in: query
          schema:
            type: string
          description: Filter by cardholder entity.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CardStatus"
          description: Filter by card status.
        - name: card_type
          in: query
          schema:
            $ref: "#/components/schemas/CardType"
          description: Filter by card type (virtual or physical).
      responses:
        "200":
          description: Paginated list of cards.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: createCard
      summary: Create a card
      description: |
        Creates a new card in `inactive` status. The card is provisioned through
        the card processor (Marqeta or Lithic) via the adapter layer.

        Virtual cards are available immediately — call the secure details endpoint
        after creation to retrieve the PAN and CVV for display in a PCI-compliant
        element.

        Physical cards enter the fulfillment pipeline. The `shipping` object on
        the card tracks fulfillment status. Physical cards must be activated
        (via `POST /cards/{card_id}/status`) before they can authorize transactions.

        The entity must be a person (cards are issued to individuals, not businesses
        or trusts). The person must be an owner on the specified account.

        **Control gates:** BA-05 (OFAC on cardholder), CD-04 (Account CDD status).

        **Events emitted:** `card.created`.
      tags: [Cards]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCard"
      responses:
        "201":
          description: Card created in `inactive` status.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Idempotent-Replayed:
              $ref: "#/components/headers/Idempotent-Replayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Entity is not a person, entity is not an owner on the account,
            account is not open, or entity/account is locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cards/{card_id}:
    get:
      operationId: getCard
      summary: Retrieve a card
      description: |
        Returns a single card by ID. Does not include sensitive details (PAN, CVV) —
        use `GET /cards/{card_id}/sensitive` for full card details.
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The card.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateCard
      summary: Update a card
      description: |
        Updates card spend controls and metadata. Card type, account, entity,
        and network are immutable. Status transitions use the dedicated
        action endpoint.

        Spend control changes take effect on the next authorization — in-flight
        authorizations are not affected.

        **Events emitted:** `card.updated`.
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCard"
      responses:
        "200":
          description: Card updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /cards/{card_id}/status:
    post:
      operationId: transitionCardStatus
      summary: Transition card status
      description: |
        Transitions a card's lifecycle status. Valid transitions:
        - `inactive` to `active` (activate — card can begin authorizing)
        - `active` to `frozen` (freeze — authorizations declined until unfrozen)
        - `frozen` to `active` (unfreeze)
        - `active` or `frozen` to `closed` (close — terminal, card number retired)

        Freezing a card causes the processor to decline all incoming authorizations.
        Existing pending authorizations are not automatically voided — they expire
        per the processor's timeout (typically 7-30 days).

        Closing is irreversible. The card number is retired at the processor and
        cannot be reissued. Any pending authorizations are voided.

        **Events emitted:** `card.activated`, `card.frozen`, `card.unfrozen`, `card.closed`.
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardStatusTransition"
      responses:
        "200":
          description: Status transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Transition not allowed from the current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /cards/{card_id}/sensitive:
    get:
      operationId: getCardSensitiveDetails
      summary: Retrieve sensitive card details
      description: |
        Returns the full PAN, CVV, and expiration for a card. This endpoint exists
        for PCI-compliant display in partner UIs (e.g., virtual card display,
        Apple/Google Wallet provisioning).

        **PCI DSS requirements:** Partners must not log, store, or persist the
        response from this endpoint. Card details should be rendered in a secure
        iframe or client-side element that never touches the partner's servers.

        This endpoint is rate-limited more aggressively than standard read endpoints.
        Excessive calls will trigger a security review.

        Only available for cards in `inactive` (virtual only) or `active` status.

        **Events emitted:** `card.sensitive_accessed` (audit trail).
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sensitive card details.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            Cache-Control:
              schema:
                type: string
                const: "no-store, no-cache, must-revalidate"
              description: Response must not be cached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardSensitiveDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Card is frozen or closed — sensitive details not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==========================================================================
  # Paths — Card Authorization (read-only)
  # ==========================================================================

  /cards/{card_id}/authorizations:
    get:
      operationId: listCardAuthorizations
      summary: List authorizations for a card
      description: |
        Returns all authorization events for a card, including approved, declined,
        reversed, and expired authorizations. Results ordered by `created_at`
        descending.

        Authorizations are created by the card processor's real-time webhook and
        evaluated by the control engine within a 2-second timeout (Decision 10).
        They are read-only from the partner's perspective.

        Approved authorizations create inflight holds in Blnk. When the processor
        sends a settlement webhook, the hold commits and `settled_at` /
        `settlement_amount` are populated. If the merchant reverses the
        authorization, the hold is voided and status becomes `reversed`.
      tags: [Cards]
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CardAuthorizationStatus"
          description: Filter by authorization status.
        - name: created_after
          in: query
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of authorizations.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardAuthorizationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /authorizations/{authorization_id}:
    get:
      operationId: getCardAuthorization
      summary: Retrieve a card authorization
      description: |
        Returns a single authorization by ID. Includes merchant details,
        control engine results, settlement info (if settled), and decline
        reason (if declined).
      tags: [Cards]
      parameters:
        - name: authorization_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The authorization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardAuthorization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Paths — Bookkeeping
  # ==========================================================================

  /accounts/{account_id}/bookkeeping-entries:
    get:
      operationId: listBookkeepingEntries
      summary: List bookkeeping entries for an account
      description: |
        Returns a paginated list of bookkeeping entries for a specific account.
        Entries are immutable and system-generated — one is created for every
        Blnk transaction webhook plus compliance hold events.

        Results are ordered by `created_at` descending (most recent first).

        This is the detailed audit trail that feeds the 5300 Reporter consumer.
        Each entry carries 5300 account code tagging, FBO classification, and
        a running balance for verifiable reconciliation.
      tags: [Bookkeeping]
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationAfter"
        - name: entry_type
          in: query
          schema:
            $ref: "#/components/schemas/BookkeepingEntryType"
          description: Filter by entry type (debit, credit, hold_placed, etc.).
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/BookkeepingEntrySource"
          description: Filter by originating transaction type.
        - name: effective_date_from
          in: query
          schema:
            type: string
            format: date
          description: Only return entries with effective_date on or after this date.
        - name: effective_date_to
          in: query
          schema:
            type: string
            format: date
          description: Only return entries with effective_date on or before this date.
      responses:
        "200":
          description: Paginated list of bookkeeping entries.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            X-RateLimit-Tier:
              $ref: "#/components/headers/X-RateLimit-Tier"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookkeepingEntryList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /bookkeeping-entries/{entry_id}:
    get:
      operationId: getBookkeepingEntry
      summary: Retrieve a bookkeeping entry
      description: |
        Returns a single bookkeeping entry by ID. Includes the full 5300 attribution,
        FBO classification, running balance, and source transaction reference.
      tags: [Bookkeeping]
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The bookkeeping entry.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookkeepingEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /bookkeeping/summary:
    get:
      operationId: getBookkeepingSummary
      summary: Get aggregated bookkeeping summary
      description: |
        Returns aggregated balances grouped by 5300 account code. This is the
        data that feeds the real-time 5300 dashboard — a live snapshot of the
        instance's balance sheet categorization.

        Each item in the response represents one 5300 code with:
        - Total balance across all accounts tagged with that code
        - Number of accounts
        - Total compliance-held (locked) amount

        The grand totals provide a single-number reconciliation check:
        `total_balance` should equal the sum of all Blnk account balances
        in this instance.

        **Caching:** This endpoint computes aggregates on-demand from the
        bookkeeping layer. For high-frequency polling, results are cached
        for up to 30 seconds.
      tags: [Bookkeeping]
      parameters:
        - name: fbo_classification
          in: query
          schema:
            $ref: "#/components/schemas/FboClassification"
          description: Filter summary to a specific FBO classification.
        - name: as_of
          in: query
          schema:
            type: string
            format: date
          description: |
            Compute summary as of a specific business date. If omitted,
            returns the current real-time summary. Useful for end-of-day
            reconciliation and historical reporting.
      responses:
        "200":
          description: Aggregated bookkeeping summary.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookkeepingSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /bookkeeping/reconciliation:
    get:
      operationId: getReconciliation
      summary: Run reconciliation check
      description: |
        Compares Blnk Deploy ledger balances against the bookkeeping layer's
        running balances for every account in this instance. Any discrepancy
        indicates a missed Blnk webhook or a bookkeeping layer bug.

        This endpoint implements Decision 25's "reconciliation heartbeat" —
        the belt-and-suspenders check that compensates for Blnk Deploy's
        opaque webhook delivery.

        When discrepancies are found, the response includes per-account
        details showing the Blnk balance, bookkeeping balance, and difference.

        **Performance:** This endpoint calls Blnk's transaction list API for
        each account with a discrepancy. For instances with many accounts,
        the response may take several seconds. Use the summary endpoint for
        quick checks and this endpoint for full verification.
      tags: [Bookkeeping]
      responses:
        "200":
          description: Reconciliation result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"